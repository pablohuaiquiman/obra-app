<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060d18;--bg2:#0a1628;--bg3:#0f1f38;
  --blue:#0ea5e9;--blue2:#38bdf8;
  --green:#22c55e;--green2:#16a34a;
  --amber:#f59e0b;--red:#ef4444;--purple:#a855f7;
  --cyan:#06b6d4;--teal:#14b8a6;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#475569;
  --border:#1e3a5f;--card:#0d1f3c;
  --font:'Barlow Condensed',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html,body,#root{height:100%;overflow:hidden}
@supports(height:100dvh){html,body,#root{height:100dvh}}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:16px;letter-spacing:.02em}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--font);outline:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.app::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(14,165,233,.12),transparent);pointer-events:none;z-index:0}
/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(6,13,24,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:10;flex-shrink:0;position:relative}
.nav-logo{font-size:18px;font-weight:700;letter-spacing:.12em;color:var(--blue);text-transform:uppercase}
/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:6px;padding:7px 16px;font-size:12px;color:var(--text3);background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;white-space:nowrap;position:relative;z-index:9}
.bc-btn{background:none;color:var(--text2);font-size:12px;font-family:var(--font);cursor:pointer;transition:color .15s;letter-spacing:.04em;padding:2px 0}
.bc-btn:hover{color:var(--blue)}
.bc-sep{color:var(--border);margin:0 2px}
/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;z-index:1;min-height:0}.main-gantt{overflow:hidden!important}
.page{padding:14px;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* LOGIN */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{width:100%;max-width:340px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 24px;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.login-title{font-size:26px;font-weight:700;letter-spacing:.15em;color:var(--blue);text-align:center;margin-bottom:4px;text-transform:uppercase}
.login-sub{font-size:12px;color:var(--text3);text-align:center;margin-bottom:24px;letter-spacing:.05em}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--text2);text-transform:uppercase;margin-bottom:5px}
.field input,.field select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--text);font-size:14px;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--blue)}
.btn-primary{width:100%;background:var(--blue);color:#fff;padding:12px;border-radius:8px;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;transition:all .2s;margin-top:6px}
.btn-primary:hover{background:var(--blue2)}
.err-msg{color:var(--red);font-size:12px;text-align:center;margin-top:8px}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(14,165,233,.4),transparent)}
.card-title{font-size:10px;font-weight:600;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:6px}
.card-val{font-size:30px;font-weight:700;font-family:var(--mono);line-height:1}
/* GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.gap10{display:flex;flex-direction:column;gap:10px}
.gap8{display:flex;flex-direction:column;gap:8px}
/* PROGRESS */
.bar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.pr{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.pr-label{font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pr-val{font-family:var(--mono);font-size:12px;color:var(--text);min-width:36px;text-align:right}
/* PILLS */
.pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.07em;white-space:nowrap}
.pill-green{background:rgba(34,197,94,.15);color:var(--green)}
.pill-blue{background:rgba(14,165,233,.15);color:var(--blue)}
.pill-amber{background:rgba(245,158,11,.15);color:var(--amber)}
.pill-red{background:rgba(239,68,68,.15);color:var(--red)}
.pill-gray{background:rgba(148,163,184,.1);color:var(--text3)}
.pill-purple{background:rgba(168,85,247,.15);color:var(--purple)}
/* SECTION HDR */
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.shdr-title{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text2)}
/* FLOOR BTNS */
.floor-btn{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:left;transition:all .18s;position:relative;overflow:hidden;width:100%}
.floor-btn:active{border-color:var(--blue);background:rgba(14,165,233,.07)}
/* DEPTO GRID */
.depto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.depto-btn{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 7px;text-align:center;transition:all .18s;position:relative;cursor:pointer;width:100%}
.depto-btn:active{border-color:var(--blue);transform:scale(.97)}
/* FASE TABS */
.ftabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;flex-shrink:0}
.ftab{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:.05em;border:1px solid var(--border);background:none;color:var(--text2);transition:all .15s;white-space:nowrap}
.ftab.on{background:var(--blue);border-color:var(--blue);color:#fff}
/* PARTIDA LIST */
.p-item{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px;margin-bottom:7px;transition:border-color .15s}
.p-item.done{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.03)}
.p-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:9px}
.p-name{font-size:13px;color:var(--text);line-height:1.35;flex:1}
.p-badge{font-family:var(--mono);font-size:13px;font-weight:700;min-width:40px;text-align:right;flex-shrink:0}
.pct-btns{display:flex;gap:3px}
.pct-btn{flex:1;padding:7px 3px;border-radius:6px;font-size:12px;font-weight:700;font-family:var(--mono);background:var(--bg2);border:1px solid var(--border);color:var(--text2);transition:all .12s}
.pct-btn.sel{color:#fff;border-color:transparent}
/* SWITCH */
.sw{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.sw-track{width:36px;height:20px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);position:relative;transition:background .2s;flex-shrink:0}
.sw-track.on{background:var(--blue);border-color:var(--blue)}
.sw-thumb{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:7px;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.sw-track.on .sw-thumb{transform:translateX(16px)}
.sw-label{font-size:12px;color:var(--text2);letter-spacing:.04em}
/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:10px 14px 10px 38px;color:var(--text);font-size:14px;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--blue)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text3);pointer-events:none}
/* PARTIDA DETAIL CARD */
.pd-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.pd-head{padding:14px 14px 10px;border-bottom:1px solid var(--border)}
.pd-body{padding:12px 14px}
.pd-floor-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(30,58,95,.4);cursor:pointer;transition:background .15s;border-radius:4px}
.pd-floor-row:last-child{border-bottom:none}
.pd-floor-row:active{background:rgba(14,165,233,.06)}
/* GANTT */
.gt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.gt-table{border-collapse:collapse;font-size:12px;min-width:600px}
.gt-table th{background:var(--bg2);color:var(--text3);font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:3}
.gt-table td{padding:6px 10px;border-bottom:1px solid rgba(30,58,95,.3);vertical-align:middle}
.gt-table tr:hover td{background:rgba(14,165,233,.03)}
.gt-bar-cell{min-width:160px}
.gt-bar-wrap{background:var(--bg2);border-radius:3px;height:14px;position:relative;overflow:hidden}
.gt-bar-fill{height:100%;border-radius:3px;transition:width .4s ease;display:flex;align-items:center;padding-left:4px}
.gt-bar-pct{font-size:9px;font-weight:700;color:#fff;white-space:nowrap}
/* EDITABLE CELL */
.editable{cursor:pointer;border-radius:4px;padding:2px 4px;transition:background .15s;display:inline-block;min-width:30px}
.editable:hover{background:rgba(14,165,233,.12)}
.cell-input{background:var(--bg2);border:1px solid var(--blue);border-radius:4px;padding:2px 6px;color:var(--text);font-size:12px;font-family:var(--mono);width:100%;min-width:80px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s ease}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;padding:20px 16px 32px;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:16px;font-weight:700;letter-spacing:.08em;color:var(--text);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;color:var(--text3);font-size:20px;padding:4px 8px;border-radius:6px;transition:color .15s}
.modal-close:hover{color:var(--text)}
/* INLINE EDIT */
.ie-input{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;width:100%;transition:border-color .15s}
.ie-input:focus{border-color:var(--blue)}
.ie-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.ie-label{font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;min-width:72px;flex-shrink:0}
/* WEEKLY / PROGRAMA */
.wk-day{margin-bottom:14px}
.wk-day-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:8px}
.wk-day-name{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--blue)}
.wk-day-date{font-size:11px;color:var(--text3);font-family:var(--mono)}
.task-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 11px;display:flex;align-items:flex-start;gap:9px;margin-bottom:5px;transition:all .15s}
.task-item.done{opacity:.55}
.task-check{width:17px;height:17px;border-radius:4px;border:2px solid var(--border);background:none;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.task-check.on{background:var(--green);border-color:var(--green)}
.task-info{flex:1;min-width:0}
.task-name{font-size:13px;color:var(--text);line-height:1.3}
.task-meta{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap}
.task-del{background:none;color:var(--text3);padding:3px 6px;font-size:16px;transition:color .15s;flex-shrink:0;line-height:1}
.task-del:hover{color:var(--red)}
.add-row{display:flex;gap:7px;margin-top:8px}
.add-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;transition:border-color .2s}
.add-input:focus{border-color:var(--blue)}
.add-btn{background:var(--blue);color:#fff;padding:9px 14px;border-radius:8px;font-size:13px;font-weight:700}
/* DATE INPUT */
.date-input{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;font-family:var(--mono);width:100%}
.date-input:focus{border-color:var(--blue);outline:none}
/* SELECT */
.sel-input{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;width:100%}
.sel-input:focus{border-color:var(--blue);outline:none}
/* IMPORT AREA */
.import-area{width:100%;background:var(--bg);border:1px dashed var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:12px;font-family:var(--mono);resize:vertical;min-height:100px;line-height:1.5}
.import-area:focus{border-color:var(--blue);outline:none}
/* TOAST */
.toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);background:var(--green2);color:#fff;padding:9px 20px;border-radius:20px;font-size:12px;font-weight:700;z-index:200;animation:toastIn .25s ease;letter-spacing:.04em;box-shadow:0 4px 20px rgba(0,0,0,.4);white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* BOTTOM NAV */
.bnav{display:flex;background:rgba(6,13,24,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);flex-shrink:0;z-index:100;position:sticky;bottom:0;width:100%;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:env(safe-area-inset-bottom,0)}
.bnav::-webkit-scrollbar{display:none}
.bnav-btn{flex:0 0 auto;min-width:68px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 6px;background:none;color:var(--text3);font-size:10px;font-family:var(--font);letter-spacing:.03em;transition:color .15s;gap:3px;min-height:56px;border:none;cursor:pointer}
.bnav-btn.on{color:var(--blue)}
.bnav-btn.on .bnav-icon{filter:drop-shadow(0 0 6px rgba(14,165,233,.5))}
.bnav-icon{font-size:18px;line-height:1}
/* UTILS */
.flex{display:flex}.aic{align-items:center}.jb{justify-content:space-between}.g8{gap:8px}.g6{gap:6px}.g4{gap:4px}
.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}
.mono{font-family:var(--mono)}.w-full{width:100%}
.faze-1{color:var(--blue)}.faze-2{color:var(--purple)}.faze-3{color:var(--green)}
.text2{color:var(--text2)}.text3{color:var(--text3)}
.bold{font-weight:700}.upper{text-transform:uppercase}.ls{letter-spacing:.06em}
/* NOTA */
.nota-ta{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px;font-family:var(--font);resize:vertical;min-height:64px}
.nota-ta:focus{border-color:var(--blue);outline:none}
/* RESPONSIBLE TAG */
.resp-tag{background:rgba(168,85,247,.12);color:var(--purple);padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600}
.fase-tag{padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600}
</style>

function flAvgLive(fl,fase,saves){
  var deps=_D.fl[fl]||[];
  if(!deps.length)return 0;
  var lk=fase===1||fase==='1'?_D.lf1:fase===2||fase==='2'?_D.lf2:_D.lf3;
  var fi=parseInt(fase);
  var tot=0;
  deps.forEach(function(dep){
    var sv=saves&&saves[dep];
    var ps=fi===1?_D.ps:fi===2?_D.ps2:_D.ps3;
    var partTot=0,partCnt=0;
    ps.forEach(function(p){
      var v;
      if(sv&&sv['f'+fi]&&sv['f'+fi][p.id]!=null)v=sv['f'+fi][p.id];
      else v=lk[dep]?(lk[dep][p.id]||0):0;
      partTot+=v;partCnt++;
    });
    tot+=partCnt?partTot/partCnt:0;
  });
  return Math.round(tot/deps.length*10)/10;
}

// ── PISOS VIEW ─────────────────────────────────────────────
function PisosView({saves,onSave,auth,toast}){
  const[floor,sf]=useState(null);
  const[dep,sd]=useState(null);
  const[hideDone,shd]=useState(false);
  const[fase,sfase]=useState('all');
  const[filt,sfilt]=useState('all');
  const floors=Object.keys(_D.fl);
  var isAdmin=auth&&(auth.role==='Admin'||auth.role==='Jefe Obra');
  // ── Depto partidas view ──
  if(dep){
    const sv=saves[dep]||{f1:{},f2:{},f3:{}};
    const ds=_D.ds[dep];
    const overallDep=calcDeptoOverall(dep,saves);
    const setVal=(f,pid,v)=>{
      const ns={...sv};
      if(!ns['f'+f])ns['f'+f]={};
      ns['f'+f]={...ns['f'+f],[pid]:v};
      onSave(dep,ns);
      toast('✓ Guardado');
    };
    const getPartidas=(f)=>{
      const ps=f==='1'?_D.ps:f==='2'?_D.ps2:_D.ps3;
      return ps.map(p=>{
        const excel=gv(dep,parseInt(f),p.id);
        const saved=sv['f'+f]&&sv['f'+f][p.id]!=null?sv['f'+f][p.id]:null;
        return{...p,val:saved!=null?saved:excel};
      });
    };
    const fases2=fase==='all'?['1','2','3']:[fase];
    const calcAvg=(f)=>{
      const ps=getPartidas(f);
      if(!ps.length)return 0;
      return Math.round(ps.reduce((s,p)=>s+p.val,0)/ps.length*10)/10;
    };
    return h('div',{className:'page'},
      h('div',{className:'flex aic jb mb10'},
        h('button',{className:'bc-btn',style:{fontSize:13},onClick:()=>sd(null)},'← '+floor.toUpperCase()),
        h(Switch,{on:hideDone,onChange:shd,label:'Ocultar 100%'})
      ),
      h('div',{style:{background:'var(--bg2)',borderRadius:9,padding:'11px 13px',marginBottom:12}},
        h('div',{className:'flex aic jb mb6'},
          h('span',{className:'mono',style:{fontSize:15,fontWeight:700}},'Depto '+dep),
          h('span',{className:'pill '+pcl(overallDep)},Math.round(overallDep)+'% total')
        ),
        h('div',{className:'flex g8'},
          ['1','2','3'].map(f=>
            h('div',{key:f,style:{flex:1,textAlign:'center'}},
              h('div',{style:{fontSize:9,color:'var(--text3)',letterSpacing:'.06em'}},'F'+f),
              h('div',{className:'mono',style:{fontSize:13,fontWeight:700,color:fc(f),marginTop:2}},calcAvg(f)+'%'),
              h(Bar,{val:calcAvg(f),color:fc(f),h:3})
            )
          )
        )
      ),
      h('div',{className:'ftabs'},
        [['all','Todo'],['1','Fase 1'],['2','Fase 2'],['3','Fase 3']].map(([k,l])=>
          h('button',{key:k,className:`ftab ${fase===k?'on':''}`,
            style:k!=='all'&&fase===k?{background:fc(k),borderColor:fc(k)}:{},
            onClick:()=>sfase(k)
          },l)
        )
      ),
      fases2.map(f=>{
        let parts=getPartidas(f);
        if(hideDone)parts=parts.filter(p=>p.val<100);
        if(!parts.length)return h('div',{key:f,style:{textAlign:'center',color:'var(--green)',padding:'18px 0',fontSize:13}},'✅ Todas las partidas al 100%');
        return h('div',{key:f},
          h('div',{style:{fontSize:10,fontWeight:700,color:fc(f),letterSpacing:'.1em',textTransform:'uppercase',marginBottom:7,marginTop:f!=='1'||fase!=='all'?10:0,paddingBottom:3,borderBottom:`1px solid ${fc(f)}33`}},
            'Fase '+f+' · '+parts.length+(hideDone?' visibles':' partidas')
          ),
          parts.map(p=>{
            const v=p.val;
            const color=v>=100?'var(--green)':v>=50?'var(--blue)':v>0?'var(--amber)':'var(--text3)';
            return h('div',{key:p.id,className:`p-item${v>=100?' done':''}`,style:v>=100?{borderColor:'rgba(34,197,94,.2)'}:{}},
              h('div',{className:'p-hdr'},
                h('div',{className:'p-name'},
                  h('span',{className:'mono',style:{fontSize:9,color:'var(--text3)',marginRight:5}},'#'+p.id),
                  p.name
                ),
                h('div',{className:'p-badge',style:{color}},v+'%')
              ),
              isAdmin&&h('div',{className:'pct-btns'},
                [0,25,50,75,100].map(pct=>
                  h('button',{key:pct,className:`pct-btn${v===pct?' sel':''}`,
                    style:v===pct?{background:color,borderColor:color}:{},
                    onClick:()=>setVal(f,p.id,pct)
                  },pct)
                )
              )
            );
          })
        );
      })
    );
  }
  // ── Floor depto grid ──
  if(floor){
    const deps=_D.fl[floor]||[];
    const fd=deps.filter(d=>{
      if(filt==='all')return true;
      var ov2=calcDeptoOverall(d,saves);
      if(filt==='act')return ov2>0&&ov2<99;
      if(filt==='done')return ov2>=99;
      if(filt==='pend')return ov2===0;
      return true;
    });
    return h('div',{className:'page'},
      h('div',{className:'flex aic jb mb12'},
        h('button',{className:'bc-btn',style:{fontSize:13},onClick:()=>{sf(null);sfilt('all');}},
          '← Pisos'
        ),
        h(Switch,{on:hideDone,onChange:shd,label:'Ocultar 100%'})
      ),
      h('div',{className:'ftabs'},
        [['all','Todos'],['act','En proceso'],['done','Completos'],['pend','Sin iniciar']].map(([k,l])=>
          h('button',{key:k,className:`ftab ${filt===k?'on':''}`,onClick:()=>sfilt(k)},l)
        )
      ),
      fd.length===0&&h('div',{style:{textAlign:'center',color:'var(--text3)',padding:'24px 0',fontSize:13}},'No hay departamentos con ese filtro'),
      h('div',{className:'depto-grid'},
        fd.map(dep=>{
          const ds=_D.ds[dep];
          var ov=calcDeptoOverall(dep,saves);
          var color=pc(ov);
          var simBg=ov>=99?'rgba(34,197,94,.15)':ov>0?'rgba(249,115,22,.10)':'rgba(239,68,68,.08)';
          var simBdr=ov>=99?'1px solid rgba(34,197,94,.45)':ov>0?'1px solid rgba(249,115,22,.40)':'1px solid rgba(239,68,68,.35)';
          return h('button',{key:dep,className:'depto-btn',onClick:function(){sd(dep);},style:{background:simBg,border:simBdr,borderRadius:9,padding:'9px 7px',textAlign:'center',transition:'all .18s',cursor:'pointer',width:'100%'}},
            h('div',{className:'mono',style:{fontSize:16,fontWeight:700,color:'var(--text)'}},dep),
            h('div',{className:'mono',style:{fontSize:12,fontWeight:700,color,marginTop:2}},Math.round(ov)+'%'),
            h('div',{style:{display:'flex',gap:2,marginTop:5,justifyContent:'center'}},
              ['1','2','3'].map(f=>
                h('div',{key:f,style:{flex:1,height:3,borderRadius:2,background:fc(f),opacity:.15+.85*(ds['f'+f]/100)}})
              )
            )
          );
        })
      )
    );
  }
  // ── Floor select ──
  return h('div',{className:'page'},
    h('div',{className:'flex aic jb mb10'},
      h('div',{className:'shdr-title'},'Seleccionar Piso'),
      h(Switch,{on:hideDone,onChange:shd,label:'Ocultar 100%'})
    ),
    h('div',{className:'gap10'},
      floors.map(fl=>{
        const a1=flAvg(fl,'1'),a2=flAvg(fl,'2'),a3=flAvg(fl,'3');
        const tot=Math.round((a1+a2+a3)/3*10)/10;
        return h('button',{key:fl,className:'floor-btn',onClick:()=>{sf(fl);sfilt('all');}},
          h('div',{style:{position:'absolute',right:12,top:12}},
            h('span',{className:`pill ${pcl(tot)}`},tot+'%')
          ),
          h('div',{style:{fontSize:17,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--text)',marginBottom:2}},fl),
          h('div',{style:{fontSize:11,color:'var(--text3)',marginBottom:10}},_D.fl[fl].length+' departamentos'),
          h('div',{style:{display:'flex',gap:6}},
            [['1',a1,'var(--blue)'],['2',a2,'var(--purple)'],['3',a3,'var(--green)']].map(([f,v,c])=>
              h('div',{key:f,style:{flex:1}},
                h('div',{style:{fontSize:9,color:'var(--text3)',letterSpacing:'.06em',marginBottom:2}},'F'+f),
                h('div',{className:'mono',style:{fontSize:13,fontWeight:700,color:c,marginTop:1,marginBottom:2}},v+'%'),
                h(Bar,{val:v,color:c,h:3})
              )
            )
          )
        );
      })
    )
  );
}

        const ne=ns+origDur;
        sne(n2d(ne));

          },'Cancelar')
        )

    );
  };
  // ── Reprogram Modal ──
  const ReprogramModal=()=>{
    var curStart=n2d(53+dateShift);
    var curEnd=n2d(303+dateShift);
    var[newStart,setNewStart]=useState(curStart);
    var delta=d2n(newStart)-(53+dateShift);
    var newEnd=n2d(303+dateShift+delta);
    function applyReprogram(){
      var newShift=dateShift+delta;
      // Also shift all existing overrides
      var nov={};
      Object.keys(overrides).forEach(function(k){
        var ov=overrides[k];
        nov[k]={};
        if(ov.s!=null)nov[k].s=ov.s+delta;
        if(ov.e!=null)nov[k].e=ov.e+delta;
        if(ov.ri!=null)nov[k].ri=ov.ri;
      });

              h('div',{style:{fontSize:10,color:'var(--text3)',marginBottom:3,letterSpacing:'.05em'}},'FIN ACTUAL'),

        ),
        h('div',{className:'ie-row',style:{marginBottom:12}},
          h('label',{className:'ie-label'},'Nuevo inicio'),

        delta!==0&&h('div',{style:{background:delta>0?'rgba(245,158,11,.1)':'rgba(14,165,233,.1)',

            h('span',{style:{fontSize:11,color:'var(--text3)',letterSpacing:'.04em'}},'Desplazamiento'),
            h('span',{className:'mono',style:{fontSize:16,fontWeight:800,color:delta>0?'var(--amber)':'var(--blue)'}},

          ),
          h('div',{style:{display:'flex',gap:12,flexWrap:'wrap'}},
            h('div',null,
              h('div',{style:{fontSize:9,color:'var(--text3)',marginBottom:2}},'NUEVO INICIO'),
              h('div',{className:'mono',style:{fontSize:12,fontWeight:700,color:'var(--blue)'}},newStart)
            ),
            h('span',{style:{alignSelf:'center',color:'var(--border)'}},'→'),
            h('div',null,
              h('div',{style:{fontSize:9,color:'var(--text3)',marginBottom:2}},'NUEVO FIN EST.'),
              h('div',{className:'mono',style:{fontSize:12,fontWeight:700,color:'var(--amber)'}},newEnd)
            )
          ),
          h('div',{style:{fontSize:10,color:'var(--text3)',marginTop:8}},
            'Se desplazan: ',
            h('strong',{style:{color:'var(--text2)'}},
              PLAN.pi.length+' pisos, '+PLAN.de.length+' deptos, '+PLAN.fa.length+' fases, '+PLAN.pa.length+' partidas'
            )
          )
        ),
        delta===0&&h('div',{style:{color:'var(--text3)',fontSize:12,textAlign:'center',padding:'8px 0'}},'Selecciona una nueva fecha de inicio para ver el desplazamiento'),
        h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end'}},
          h('button',{onClick:function(){setShowReprogram(false);},
            style:{padding:'8px 16px',borderRadius:8,border:'1px solid var(--border)',
              background:'none',color:'var(--text2)',fontSize:12,cursor:'pointer'}
          },'Cancelar'),

          },'Aplicar '+(delta>0?'+':'')+delta+'d a todo el proyecto')
        )

  return h('div',{style:{display:'flex',flexDirection:'column',height:'100%',minHeight:0,overflow:'hidden'}},

            h('span',{style:{fontSize:11,fontWeight:700,color:'var(--blue)',
              fontFamily:'var(--mono)'}},PROJECT_START.toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'}))
          ),
          h('span',{style:{color:'var(--border)',fontSize:12}},'→'),
          h('div',{style:{display:'flex',alignItems:'center',gap:5}},
            h('span',{style:{fontSize:10,color:'var(--text3)',letterSpacing:'.05em'}},'FIN EST.:'),
            h('span',{style:{fontSize:11,fontWeight:700,color:'var(--amber)',
              fontFamily:'var(--mono)'}},PROJECT_END.toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'}))
          ),
          h('div',{style:{display:'flex',alignItems:'center',gap:4,
            background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.3)',
            borderRadius:6,padding:'2px 7px'}},
            h('span',{style:{fontSize:9,color:'var(--amber)',letterSpacing:'.04em'}},'HOY'),
            h('span',{style:{fontSize:10,fontWeight:700,color:'var(--amber)',
              fontFamily:'var(--mono)'}},
              new Date().toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'})
            )
          ),
          // Days remaining
          (()=>{
            const rem=Math.ceil((new Date('2026-10-30')-new Date())/(864e5));
            const elapsed=Math.ceil((new Date()-new Date('2026-02-23'))/(864e5));
            const total=Math.ceil((new Date('2026-10-30')-new Date('2026-02-23'))/(864e5));
            const pct=Math.min(100,Math.round(elapsed/total*100));

              ),

      h('div',{style:{display:'flex',gap:6,alignItems:'center',flexShrink:0,flexWrap:'wrap'}},
        isAdmin&&h('button',{onClick:function(){setShowReprogram(true);},

            borderRadius:6,padding:'4px 10px',color:'var(--blue)',fontSize:10,fontWeight:700,
            cursor:'pointer',letterSpacing:'.04em',flexShrink:0}
        },'📅 Reprogramar'),
        h('div',{style:{width:10,height:2,background:'var(--amber)',borderRadius:1}}),
        h('span',{style:{fontSize:9,color:'var(--text3)'}},'Hoy'),
        h('div',{style:{width:10,height:8,background:'var(--green)',borderRadius:2}}),

        h('div',{style:{width:10,height:8,background:'var(--red)',borderRadius:2}}),
        h('span',{style:{fontSize:9,color:'var(--text3)'}},'Atrasado')
      )
    ),
    // Breadcrumb
    h(Crumb,null),
    // Column headers
    h(ColHeader,{label:getColLabel()}),
    // Scrollable rows
    h('div',{style:{flex:1,overflowY:'auto',overflowX:'hidden',WebkitOverflowScrolling:'touch',minHeight:0}},

    )
  );
}
// ── PLAN PERSONALIZADO VIEW ─────────────────────────────────
function ProgramaView({ganttData,saves,onWeekSave,weekData,auth,toast}){
  const[filtFase,sff]=useState('all');
  const[filtResp,sfr]=useState('all');
  const[showEntregas,setShowEntregas]=useState(false);
  const[startDate,ssd]=useState(()=>{
    const d=new Date();
    const day=d.getDay();
    d.setDate(d.getDate()-day+(day===0?-6:1));
    return d.toISOString().slice(0,10);
  });
  const[dayInput,sdi]=useState({});
  const resps=PLAN.rl; // 19 responsables únicos
  const faseColor=f=>f==='1'?'var(--blue)':f==='2'?'var(--purple)':'var(--green)';
  const pd=(s)=>s?new Date(s+'T12:00:00'):null;
  const dayNames=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const weekDays=dayNames.map((_,i)=>{
    const d=new Date(startDate+'T12:00:00');
    d.setDate(d.getDate()+i);
    return{name:dayNames[i],date:d.toISOString().slice(0,10),
      display:d.toLocaleDateString('es-CL',{day:'2-digit',month:'short'})};
  });
  const endDate=weekDays[weekDays.length-1].date;
  const wk=startDate;
  // ── ENTREGAS: departamentos cuya fecha de entrega cae en esta semana ──
  const depDeliveriesThisWeek=(function(){
    var ov=ganttData.overrides||{};
    var ds=ganttData.dateShift||0;
    var result={};
    PLAN.de.forEach(function(dep,di){
      var ovDep=ov['dep_'+di];
      var eDay=ovDep&&ovDep.e!=null?ovDep.e:(dep.e+ds);
      var eDate=n2d(eDay);
      if(eDate>=startDate&&eDate<=endDate){
        if(!result[eDate])result[eDate]=[];
        // Buscar fase 3 de este depto
        var fa3Idx=-1;
        PLAN.fa.forEach(function(f,fi){if(f.di===di&&f.f==='3')fa3Idx=fi;});
        // Partidas de fase 3
        var f3Parts=fa3Idx>=0?PLAN.pa.filter(function(pa){return pa[5]===fa3Idx;}):[]; 
        var lastPart=f3Parts.length?f3Parts[f3Parts.length-1]:null;
        var lastPartName=lastPart?planName(lastPart[0]):'';
        var lastResp=lastPart?planResp(lastPart[3]):'';
        result[eDate].push({dep:dep,di:di,fa3Idx:fa3Idx,lastPartName:lastPartName,lastResp:lastResp,pisoName:PLAN.pi[dep.pi]?PLAN.pi[dep.pi].n:''});
      }
    });
    return result;
  })();
  var totalEntregasSemana=Object.values(depDeliveriesThisWeek).reduce(function(s,a){return s+a.length;},0);
  const manualData=weekData[wk]||{tasks:{},nota:''};
  const navWeek=dir=>{
    const d=new Date(startDate+'T12:00:00');
    d.setDate(d.getDate()+dir*7);
    ssd(d.toISOString().slice(0,10));
  };
  const saveNota=v=>onWeekSave(wk,{...manualData,nota:v});
  const addManual=(day,text)=>{
    if(!text.trim())return;
    const nd={...manualData};
    if(!nd.tasks[day])nd.tasks[day]=[];
    nd.tasks[day]=[...nd.tasks[day],{id:Date.now(),text,done:false}];
    onWeekSave(wk,nd);
    toast('✓ Tarea agregada');
  };
  const toggleManual=(day,id)=>{
    const nd={...manualData};
    nd.tasks[day]=(nd.tasks[day]||[]).map(t=>t.id===id?{...t,done:!t.done}:t);
    onWeekSave(wk,nd);
  };
  const delManual=(day,id)=>{
    const nd={...manualData};
    nd.tasks[day]=(nd.tasks[day]||[]).filter(t=>t.id!==id);
    onWeekSave(wk,nd);
  };
  // Helper: abs date from fase_idx + delta
  const abs=(fi,delta)=>{
    if(fi==null||!PLAN.fa[fi])return'';
    return n2d(PLAN.fa[fi].s+(delta||0));
  };
  // Precompute per-fase partida index map (for override lookup)
  const faPartidas={};
  PLAN.pa.forEach(function(pa){
    var fi=pa[5];
    if(!faPartidas[fi])faPartidas[fi]=[];
    faPartidas[fi].push(pa);
  });
  // Get Gantt override for a partida
  const getPartidaOv=(pa)=>{
    var fi=pa[5];
    var localIdx=faPartidas[fi]?faPartidas[fi].indexOf(pa):-1;
    if(localIdx<0)return{};
    return (ganttData.overrides||{})['pa_'+fi+'_'+localIdx]||{};
  };
  // Plan tasks that fall within a specific day (using Gantt overrides as master)
  const planTasksForDay=(dayDate)=>{
    const dayD=pd(dayDate);
    if(!dayD)return[];
    return PLAN.pa.filter(pa=>{
      const fi=pa[5];
      const fase=PLAN.fa[fi];
      if(!fase)return false;
      const ov=getPartidaOv(pa);
      // Responsable: Gantt override > PLAN original
      const respIdx=ov.ri!=null?ov.ri:pa[3];
      const resp=respIdx===255||respIdx==null?'':PLAN.rl[respIdx]||'';
      if(filtFase!=='all'&&filtFase!==fase.f)return false;
      if(filtResp!=='all'&&resp!==filtResp)return false;
      // Dates: Gantt override > PLAN original
      const s_date=ov.s!=null?n2d(ov.s):abs(fi,pa[1]);
      const e_date=ov.e!=null?n2d(ov.e):abs(fi,pa[2]);
      const s=pd(s_date);
      const e=pd(e_date);
      if(!s)return false;
      if(s&&e)return s<=dayD&&e>=dayD&&s<=pd(endDate)&&e>=pd(startDate);
      return s.toISOString().slice(0,10)===dayDate;
    }).slice(0,30);
  };
  // Count tasks per day for summary badge
  const dayCount=weekDays.map(({date})=>planTasksForDay(date).length);
  const totalPlanTasks=dayCount.reduce((a,b)=>a+b,0);
  return h('div',{className:'page gap10'},
    // ── FILTERS CARD ──
    h('div',{className:'card'},
      // Header row with week nav
      h('div',{className:'flex aic jb mb8'},
        h('div',{style:{fontSize:11,fontWeight:700,color:'var(--text2)',letterSpacing:'.08em'}},'FILTROS'),
        h('div',{className:'flex aic g6'},
          h('button',{onClick:()=>navWeek(-1),style:{background:'var(--bg2)',border:'1px solid var(--border)',
            borderRadius:6,padding:'5px 10px',color:'var(--text2)',cursor:'pointer',fontSize:14}},'‹'),
          h('span',{style:{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}},'S'),
          h('button',{onClick:()=>navWeek(1),style:{background:'var(--bg2)',border:'1px solid var(--border)',
            borderRadius:6,padding:'5px 10px',color:'var(--text2)',cursor:'pointer',fontSize:14}},'›')
        )
      ),
      // Date range row
      h('div',{className:'flex g8 mb8'},
        h('div',{style:{flex:1}},
          h('div',{style:{fontSize:10,color:'var(--text3)',letterSpacing:'.06em',marginBottom:4}},'INICIO SEMANA'),
          h('input',{type:'date',className:'date-input',value:startDate,
            onChange:e=>ssd(e.target.value)})
        ),
        h('div',{style:{flex:1}},
          h('div',{style:{fontSize:10,color:'var(--text3)',letterSpacing:'.06em',marginBottom:4}},'FIN SEMANA'),
          h('div',{className:'date-input',style:{color:'var(--text2)',
            display:'flex',alignItems:'center'}},endDate)
        )
      ),
      // Fase + Responsable row
      h('div',{className:'flex g8'},
        h('div',{style:{flex:1}},
          h('div',{style:{fontSize:10,color:'var(--text3)',letterSpacing:'.06em',marginBottom:4}},'FASE'),
          h('select',{className:'sel-input',value:filtFase,onChange:e=>sff(e.target.value)},
            h('option',{value:'all'},'Todas las fases'),
            h('option',{value:'1'},'Fase 1'),
            h('option',{value:'2'},'Fase 2'),
            h('option',{value:'3'},'Fase 3')
          )
        ),
        h('div',{style:{flex:1}},
          h('div',{style:{fontSize:10,color:'var(--text3)',letterSpacing:'.06em',marginBottom:4}},'RESPONSABLE'),
          h('select',{className:'sel-input',value:filtResp,onChange:e=>sfr(e.target.value)},
            h('option',{value:'all'},'Todos'),
            resps.map((r,i)=>h('option',{key:i,value:r},r))
          )
        )
      ),
      // Summary pill
      totalPlanTasks>0&&h('div',{style:{marginTop:8,fontSize:11,color:'var(--text3)'}},
        h('span',{style:{background:'rgba(14,165,233,.15)',color:'var(--blue)',
          padding:'2px 8px',borderRadius:10,fontSize:11,fontWeight:600}},
          totalPlanTasks+' tareas del plan esta semana'
        ),
        filtResp!=='all'&&h('span',{style:{marginLeft:6,background:'rgba(168,85,247,.15)',
          color:'var(--purple)',padding:'2px 8px',borderRadius:10,fontSize:11,fontWeight:600}},
          filtResp
        ),
        totalEntregasSemana>0&&h('span',{
          onClick:function(){setShowEntregas(!showEntregas);},
          style:{marginLeft:6,background:showEntregas?'rgba(34,197,94,.35)':'rgba(34,197,94,.15)',
            color:'var(--green)',padding:'2px 8px',borderRadius:10,fontSize:11,fontWeight:600,
            cursor:'pointer',userSelect:'none',border:'1px solid rgba(34,197,94,.3)'}},
          '🏠 '+totalEntregasSemana+' entrega'+(totalEntregasSemana>1?'s':'')+' '+(showEntregas?'▲':'▼')
        )
      )
    ),
    // ── PANEL ENTREGAS SEMANA ──
    showEntregas&&totalEntregasSemana>0&&h('div',{className:'card',style:{
      border:'1px solid rgba(34,197,94,.3)',background:'rgba(34,197,94,.04)'}},
      h('div',{style:{fontSize:11,fontWeight:700,color:'var(--green)',
        letterSpacing:'.08em',marginBottom:10,display:'flex',alignItems:'center',gap:6}},
        '🏠 ENTREGAS PROGRAMADAS ESTA SEMANA',
        h('span',{style:{fontSize:10,fontWeight:400,color:'var(--text3)',marginLeft:'auto'}},
          totalEntregasSemana+' departamento'+(totalEntregasSemana>1?'s':''))
      ),
      weekDays.map(function(wd){
        var dayEnts=depDeliveriesThisWeek[wd.date]||[];
        if(!dayEnts.length)return null;
        return h('div',{key:wd.date,style:{marginBottom:10}},
          h('div',{style:{fontSize:10,fontWeight:700,color:'var(--text2)',
            letterSpacing:'.06em',marginBottom:5,display:'flex',alignItems:'center',gap:6}},
            h('span',{style:{background:'var(--green)',color:'#fff',
              borderRadius:4,padding:'1px 6px',fontSize:9}},wd.name.toUpperCase()),
            h('span',{style:{color:'var(--text3)'}},wd.display),
            h('span',{style:{background:'rgba(34,197,94,.15)',color:'var(--green)',
              borderRadius:8,padding:'0 6px',fontSize:10,fontWeight:700}},
              dayEnts.length+' dpto'+(dayEnts.length>1?'s':''))
          ),
          h('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
            dayEnts.map(function(ent,ei){
              return h('div',{key:ei,style:{
                background:'var(--card)',border:'1px solid rgba(34,197,94,.3)',
                borderLeft:'3px solid var(--green)',borderRadius:8,
                padding:'7px 10px',minWidth:140,flex:'1 1 140px'}},
                h('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:3}},
                  h('span',{style:{fontSize:14,fontWeight:800,color:'var(--green)',
                    fontFamily:'var(--mono)'}},'D'+ent.dep.d),
                  h('span',{style:{fontSize:9,background:'rgba(34,197,94,.15)',
                    color:'var(--green)',padding:'1px 5px',borderRadius:4,fontWeight:700}},'F3')
                ),
                h('div',{style:{fontSize:10,color:'var(--text2)',marginBottom:2}},ent.dep.n),
                h('div',{style:{fontSize:9,color:'var(--text3)'}},ent.pisoName),
                ent.lastPartName&&h('div',{style:{
                  fontSize:9,color:'var(--text3)',marginTop:3,
                  borderTop:'1px solid var(--border)',paddingTop:3}},
                  '↳ ',ent.lastPartName
                )
              );
            })
          )
        );
      })
    ),
    // ── DAYS ──
    weekDays.map(({name,date,display})=>{
      const planTasks=planTasksForDay(date);
      const manTasks=(manualData.tasks[date]||[]);
      const total=planTasks.length+manTasks.length;
      const done=manTasks.filter(t=>t.done).length;
      return h('div',{key:date,className:'wk-day'},
        // Day header
        h('div',{className:'wk-day-hdr'},
          h('div',{className:'wk-day-name'},name),
          h('div',{className:'flex aic g6'},
            h('span',{className:'wk-day-date'},display),
            total>0&&h('span',{className:`pill ${done===manTasks.length&&manTasks.length>0?'pill-green':'pill-gray'}`},
              planTasks.length>0?planTasks.length+' plan'+(manTasks.length>0?' + '+done+'/'+manTasks.length+' manual':''):
              done+'/'+manTasks.length
            )
          )
        ),
        // Entregas programadas este día
        (depDeliveriesThisWeek[date]||[]).length>0&&h('div',{style:{marginBottom:8}},
          h('div',{style:{fontSize:10,fontWeight:700,color:'var(--green)',letterSpacing:'.08em',
            marginBottom:4,display:'flex',alignItems:'center',gap:4}},
            '🏠 ENTREGAS PROGRAMADAS'
          ),
          (depDeliveriesThisWeek[date]||[]).map(function(ent,ei){
            return h('div',{key:ei,style:{
              background:'rgba(34,197,94,.07)',
              border:'1px solid rgba(34,197,94,.35)',
              borderLeft:'3px solid var(--green)',
              borderRadius:8,padding:'8px 11px',marginBottom:4}},
              h('div',{style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}},
                h('span',{style:{fontSize:13,fontWeight:700,color:'var(--green)',fontFamily:'var(--mono)'}},'D'+ent.dep.d),
                h('span',{style:{fontSize:12,color:'var(--text)',fontWeight:600}},ent.dep.n),
                h('span',{style:{background:'rgba(34,197,94,.15)',color:'var(--green)',
                  padding:'1px 7px',borderRadius:8,fontSize:10,fontWeight:700}},
                  '✓ ENTREGA F3'
                ),
                ent.pisoName&&h('span',{style:{fontSize:10,color:'var(--text3)',
                  background:'var(--bg2)',padding:'1px 6px',borderRadius:6}},ent.pisoName)
              ),
              ent.lastPartName&&h('div',{style:{marginTop:4,fontSize:10,color:'var(--text2)',
                display:'flex',alignItems:'center',gap:6}},
                h('span',{style:{color:'var(--text3)'}},'úLT. PARTIDA:'),
                h('span',null,ent.lastPartName),
                ent.lastResp&&h('span',{style:{background:'rgba(168,85,247,.12)',color:'var(--purple)',
                  padding:'1px 6px',borderRadius:6,fontSize:10}},ent.lastResp)
              )
            );
          })
        ),
        // Plan tasks for this day (from PLAN data)
        planTasks.length>0&&h('div',{style:{marginBottom:6}},
          planTasks.map((pa,i)=>{
            const fi=pa[5];
            const fnum=PLAN.fa[fi]?.f||'1';
            const color=faseColor(fnum);
            const name_=planName(pa[0]);
            const ov_=getPartidaOv(pa);
            const respIdx_=ov_.ri!=null?ov_.ri:pa[3];
            const resp=planResp(respIdx_);
            const dep=PLAN.de[PLAN.fa[fi]?.di];
            const depNum=dep?.d||'';
            const pct=pa[4]||0;
            const s=ov_.s!=null?n2d(ov_.s):abs(fi,pa[1]);
            const e=ov_.e!=null?n2d(ov_.e):abs(fi,pa[2]);
            const isDone=pct>=100;
            return h('div',{key:i,style:{
              background:'var(--card)',
              border:`1px solid ${isDone?'rgba(34,197,94,.3)':color+'33'}`,
              borderLeft:`3px solid ${isDone?'var(--green)':color}`,
              borderRadius:8,padding:'8px 11px',marginBottom:4}},
              // Task name
              h('div',{style:{fontSize:12,color:isDone?'var(--green)':'var(--text)',
                lineHeight:1.3,marginBottom:5,fontWeight:500}},name_),
              // Meta row
              h('div',{style:{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}},
                depNum&&h('span',{style:{fontSize:10,color:'var(--text3)',
                  fontFamily:'var(--mono)',background:'var(--bg2)',
                  padding:'1px 5px',borderRadius:4}},'D'+depNum),
                h('span',{style:{background:color+'22',color,
                  padding:'1px 6px',borderRadius:8,fontSize:10,fontWeight:600}},
                  'Fase '+fnum),
                resp&&h('span',{style:{background:'rgba(168,85,247,.12)',color:'var(--purple)',
                  padding:'1px 6px',borderRadius:8,fontSize:10,fontWeight:600,
                  maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},
                  resp),
                h('div',{style:{marginLeft:'auto',display:'flex',alignItems:'center',gap:4}},
                  s&&e&&h('span',{style:{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)'}},
                    s.slice(5)+' → '+e.slice(5)),
                  h('span',{className:`pill ${pcl(pct)}`,style:{fontSize:9}},pct+'%')
                )
              )
            );
          })
        ),
        // Manual tasks
        manTasks.map(t=>
          h('div',{key:t.id,className:`task-item${t.done?' done':''}`,
            style:{borderColor:'var(--border)',flexDirection:'column',alignItems:'stretch',gap:0}},
            h('div',{style:{display:'flex',alignItems:'center',gap:9}},
              h('button',{className:`task-check${t.done?' on':''}`,
                onClick:()=>toggleManual(date,t.id)},
                t.done&&h('span',{style:{color:'#fff',fontSize:10,fontWeight:700}},'✓')
              ),
              h('span',{className:`task-name${t.done?' done':''}`,style:{flex:1}},t.text),
              h('button',{className:'task-del',onClick:()=>delManual(date,t.id)},'×')
            ),
            !t.done&&h('input',{
              type:'text',
              placeholder:'Causa de no cumplimiento...',
              value:t.causa||'',
              onChange:function(e){setCausa(date,t.id,e.target.value);},
              style:{marginTop:5,marginLeft:26,background:'rgba(239,68,68,.09)',
                border:'1px solid rgba(239,68,68,.3)',borderRadius:5,padding:'3px 8px',
                color:'var(--red)',fontSize:10,width:'calc(100% - 26px)',
                outline:'none',fontFamily:'var(--font)'}
            })
          )
        ),
        // Add manual task
        h('div',{className:'add-row'},
          h('input',{className:'add-input',
            value:dayInput[date]||'',
            onChange:e=>sdi({...dayInput,[date]:e.target.value}),
            placeholder:'+ Agregar tarea manual para '+name+'...',
            onKeyDown:e=>{
              if(e.key==='Enter'&&dayInput[date]?.trim()){
                addManual(date,dayInput[date]);
                sdi({...dayInput,[date]:''});
              }
            }
          }),
          h('button',{className:'add-btn',
            onClick:()=>{
              if(dayInput[date]?.trim()){
                addManual(date,dayInput[date]);
                sdi({...dayInput,[date]:''});
              }
            }
          },'+')
        )
      );
    }),
    // ── NOTAS AL FINAL ──
    h('div',{className:'card mt10'},
      h('div',{style:{fontSize:10,fontWeight:700,color:'var(--text3)',
        letterSpacing:'.1em',marginBottom:6}},'NOTAS DE TERRENO'),
      h('textarea',{className:'nota-ta',value:manualData.nota||'',
        onChange:e=>saveNota(e.target.value),
        placeholder:'Observaciones generales de la semana...'})
    )
  );
}
// ── MAIN APP ───────────────────────────────────────────────

// ── RENDIMIENTO VIEW ─────────────────────────────────────────
function RendimientoView({saves,rendData,onRendSave,auth,toast}){
  var[mode,setMode]=useState('teorico');
  var[fase,setFase]=useState('1');
  var rdInit=rendData||{};
  var[diasRest,setDiasRest]=useState(rdInit.diasRest||178);
  var[rendBase,setRendBase]=useState(function(){
    if(rdInit.rendBase)return rdInit.rendBase;
    var rb={};
    _D.ps.forEach(function(p){rb['1_'+p.id]=2.0;});
    _D.ps2.forEach(function(p){rb['2_'+p.id]=1.5;});
    _D.ps3.forEach(function(p){rb['3_'+p.id]=2.5;});
    return rb;
  });
  var[realInputs,setRealInputs]=useState(rdInit.realInputs||{});
  var totalDeptos=Object.keys(_D.ds).length;
  var semRest=Math.round(diasRest/7);
  var mesRest=Math.round(diasRest/30);

  function getCompletados(f,pid){
    var allD=Object.keys(_D.ds);var cnt=0;
    var lk=f==='1'?_D.lf1:f==='2'?_D.lf2:_D.lf3;
    allD.forEach(function(dep){
      var sv=saves&&saves[dep];
      var v;
      if(sv&&sv['f'+f]&&sv['f'+f][pid]!=null)v=sv['f'+f][pid];
      else v=lk[dep]?(lk[dep][pid]||0):0;
      if(v>=100)cnt++;
    });
    return cnt;
  }

  var partidas=fase==='1'?_D.ps:fase==='2'?_D.ps2:_D.ps3;
  var totalPers=0,totalSub=0,totalCasa=0,criticos=0,atencion=0;
  partidas.forEach(function(p){
    var key=fase+'_'+p.id;
    var rendTeo=rendBase[key]||2.0;
    var comp=getCompletados(fase,p.id);
    var saldo=totalDeptos-comp;
    var pn=diasRest>0&&rendTeo>0?Math.ceil(saldo/(diasRest*rendTeo)):0;
    totalPers+=pn;
    var ri=realInputs[key]||{};
    totalSub+=(parseFloat(ri.pers_sub)||0);
    totalCasa+=(parseFloat(ri.pers_casa)||0);
    if(pn>6)criticos++;else if(pn>3)atencion++;
  });

  function renderTeorico(){
    return h('div',{style:{overflowX:'auto',WebkitOverflowScrolling:'touch'}},
      h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:12,minWidth:520}},
        h('thead',null,h('tr',null,
          ['Partida','Avance','Total','Complet.','Saldo','R.Teórico','Personal','Estado'].map(function(col){
            return h('th',{key:col,style:{background:'var(--bg2)',color:'var(--text3)',padding:'7px',
              textAlign:'left',fontWeight:600,letterSpacing:'.04em',textTransform:'uppercase',
              borderBottom:'1px solid var(--border)',whiteSpace:'nowrap',fontSize:9}},col);
          })
        )),
        h('tbody',null,partidas.map(function(p){
          var key=fase+'_'+p.id;
          var avance=getPartidaAvgLive(parseInt(fase),p.id,saves);
          var comp=getCompletados(fase,p.id);
          var saldo=totalDeptos-comp;
          var rendTeo=rendBase[key]||2.0;
          var pn=diasRest>0&&rendTeo>0?Math.ceil(saldo/(diasRest*rendTeo)):0;
          var estado=saldo===0?'Completo':pn<=2?'OK':pn<=5?'Atencion':'Critico';
          var sc=saldo===0?'var(--text3)':pn<=2?'var(--green)':pn<=5?'var(--amber)':'var(--red)';
          var sb=saldo===0?'rgba(148,163,184,.1)':pn<=2?'rgba(34,197,94,.15)':pn<=5?'rgba(245,158,11,.15)':'rgba(239,68,68,.15)';
          var nm=p.name.replace(/^F[0-9]+\ /,'');
          return h('tr',{key:p.id,style:{borderBottom:'1px solid rgba(30,58,95,.3)'}},
            h('td',{style:{padding:'7px',color:'var(--text)',fontSize:11,maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'},title:p.name},nm),
            h('td',{style:{padding:'7px',fontFamily:'var(--mono)',fontWeight:700,color:pc(avance)}},avance+'%'),
            h('td',{style:{padding:'7px',fontFamily:'var(--mono)',color:'var(--text2)'}},totalDeptos),
            h('td',{style:{padding:'7px',fontFamily:'var(--mono)',color:'var(--green)'}},comp),
            h('td',{style:{padding:'7px',fontFamily:'var(--mono)',color:'var(--amber)'}},saldo),
            h('td',{style:{padding:'7px'}},
              auth&&auth.role==='Admin'?
              h('input',{type:'number',min:0.1,max:20,step:0.1,value:rendTeo,
                onChange:function(e){
                  var v=parseFloat(e.target.value)||0.1;
                  var nr=Object.assign({},rendBase);nr[key]=v;
                  setRendBase(nr);
                  onRendSave&&onRendSave(Object.assign({},rdInit,{rendBase:nr,diasRest:diasRest}));
                },
                style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:5,
                  padding:'3px 5px',color:'var(--blue)',fontSize:11,fontFamily:'var(--mono)',width:50,outline:'none'}
              }):
              h('span',{style:{fontFamily:'var(--mono)',color:'var(--blue)'}},rendTeo.toFixed(1))
            ),
            h('td',{style:{padding:'7px',fontFamily:'var(--mono)',fontWeight:700,color:sc}},pn>0?pn+' p':'—'),
            h('td',{style:{padding:'7px'}},
              h('span',{style:{display:'inline-flex',alignItems:'center',padding:'2px 6px',borderRadius:20,fontSize:9,fontWeight:700,background:sb,color:sc}},estado)
            )
          );
        }))
      )
    );
  }

  function renderReal(){
    // Phase totals
    var pTotSub=0,pTotCasa=0,pTotNeed=0;
    partidas.forEach(function(p){
      var key=fase+'_'+p.id;
      var ri=realInputs[key]||{};
      var rendTeo=rendBase[key]||2.0;
      var comp=getCompletados(fase,p.id);
      var saldo=totalDeptos-comp;
      pTotSub+=parseFloat(ri.pers_sub)||0;
      pTotCasa+=parseFloat(ri.pers_casa)||0;
      var avDiario=parseFloat(ri.av)||0;
      var personal=(parseFloat(ri.pers_sub)||0)+(parseFloat(ri.pers_casa)||0);
      var rendReal=personal>0?avDiario/personal:0;
      var sugNeed=rendReal>0&&diasRest>0?Math.ceil(saldo/(diasRest*rendReal)):
                  rendTeo>0&&diasRest>0?Math.ceil(saldo/(diasRest*rendTeo)):0;
      pTotNeed+=sugNeed;
    });
    return h('div',{style:{overflowX:'auto',WebkitOverflowScrolling:'touch'}},
      // Phase totals header
      h('div',{style:{display:'flex',gap:8,marginBottom:8,flexWrap:'wrap'}},
        h('div',{style:{background:'rgba(168,85,247,.12)',border:'1px solid rgba(168,85,247,.3)',borderRadius:8,padding:'6px 12px',textAlign:'center'}},
          h('div',{style:{fontFamily:'var(--mono)',fontSize:18,fontWeight:800,color:'var(--purple)'}},pTotSub),
          h('div',{style:{fontSize:9,color:'var(--text3)',letterSpacing:'.06em',fontWeight:600}},'SUBCTO FASE '+fase)
        ),
        h('div',{style:{background:'rgba(34,197,94,.12)',border:'1px solid rgba(34,197,94,.3)',borderRadius:8,padding:'6px 12px',textAlign:'center'}},
          h('div',{style:{fontFamily:'var(--mono)',fontSize:18,fontWeight:800,color:'var(--green)'}},pTotCasa),
          h('div',{style:{fontSize:9,color:'var(--text3)',letterSpacing:'.06em',fontWeight:600}},'CASA FASE '+fase)
        ),
        h('div',{style:{background:'rgba(14,165,233,.12)',border:'1px solid rgba(14,165,233,.3)',borderRadius:8,padding:'6px 12px',textAlign:'center'}},
          h('div',{style:{fontFamily:'var(--mono)',fontSize:18,fontWeight:800,color:'var(--blue)'}},pTotSub+pTotCasa),
          h('div',{style:{fontSize:9,color:'var(--text3)',letterSpacing:'.06em',fontWeight:600}},'TOTAL REAL')
        ),
        h('div',{style:{background:'rgba(245,158,11,.12)',border:'1px solid rgba(245,158,11,.3)',borderRadius:8,padding:'6px 12px',textAlign:'center'}},
          h('div',{style:{fontFamily:'var(--mono)',fontSize:18,fontWeight:800,color:'var(--amber)'}},pTotNeed),
          h('div',{style:{fontSize:9,color:'var(--text3)',letterSpacing:'.06em',fontWeight:600}},'NECESARIO')
        ),
        (pTotSub+pTotCasa)<pTotNeed&&h('div',{style:{background:'rgba(239,68,68,.12)',border:'1px solid rgba(239,68,68,.35)',borderRadius:8,padding:'6px 12px',textAlign:'center',display:'flex',alignItems:'center',gap:5}},
          h('span',{style:{fontSize:16}},'⚠'),
          h('div',null,
            h('div',{style:{fontFamily:'var(--mono)',fontSize:16,fontWeight:800,color:'var(--red)'}},pTotNeed-(pTotSub+pTotCasa)),
            h('div',{style:{fontSize:9,color:'var(--red)',letterSpacing:'.06em',fontWeight:700}},'FALTAN')
          )
        )
      ),
      h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:12,minWidth:620}},
        h('thead',null,h('tr',null,
          ['Partida','R.Teo','Av.Diario','Subcto','Casa','Total','R.Real','Brecha','Sug.'].map(function(col){
            return h('th',{key:col,style:{background:'var(--bg2)',color:
              col==='Subcto'?'var(--purple)':col==='Casa'?'var(--green)':'var(--text3)',
              padding:'7px',textAlign:'left',fontWeight:600,letterSpacing:'.04em',textTransform:'uppercase',
              borderBottom:'1px solid var(--border)',whiteSpace:'nowrap',fontSize:9}},col);
          })
        )),
        h('tbody',null,partidas.map(function(p){
          var key=fase+'_'+p.id;
          var rendTeo=rendBase[key]||2.0;
          var ri=realInputs[key]||{av:'',pers_sub:'',pers_casa:''};
          var avDiario=parseFloat(ri.av)||0;
          var persSub=parseFloat(ri.pers_sub)||0;
          var persCasa=parseFloat(ri.pers_casa)||0;
          var personal=persSub+persCasa;
          var rendReal=personal>0?Math.round(avDiario/personal*10)/10:0;
          var brecha=personal>0?Math.round((rendReal-rendTeo)*10)/10:null;
          var comp=getCompletados(fase,p.id);
          var saldo=totalDeptos-comp;
          var sugDot=rendReal>0&&diasRest>0?Math.ceil(saldo/(diasRest*rendReal)):
                     rendTeo>0&&diasRest>0?Math.ceil(saldo/(diasRest*rendTeo)):null;
          var brcColor=brecha===null?'var(--text3)':brecha>=0?'var(--green)':'var(--red)';
          var rrColor=rendReal>0?pc(Math.min(100,Math.round(rendReal/rendTeo*100))):'var(--text3)';
          var nm=p.name.replace(/^F[0-9]+\ /,'');
          var needPers=sugDot||0;
          var isFalta=personal>0&&personal<needPers;
          function upd(field,val){
            var nr=Object.assign({},realInputs);
            nr[key]=Object.assign({},ri);nr[key][field]=val;
            setRealInputs(nr);
            onRendSave&&onRendSave(Object.assign({},rdInit,{rendBase:rendBase,diasRest:diasRest,realInputs:nr}));
          }
          return h('tr',{key:p.id,style:{borderBottom:'1px solid rgba(30,58,95,.3)',
            background:isFalta?'rgba(239,68,68,.05)':'transparent'}},
            h('td',{style:{padding:'7px',color:'var(--text)',fontSize:11,maxWidth:130,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'},title:p.name},nm),
            h('td',{style:{padding:'7px',fontFamily:'var(--mono)',color:'var(--blue)',fontSize:11}},rendTeo.toFixed(1)),
            h('td',{style:{padding:'7px'}},
              h('input',{type:'number',min:0,step:0.5,placeholder:'0',value:ri.av,
                onChange:function(e){upd('av',e.target.value);},
                style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:5,
                  padding:'3px 5px',color:'var(--text)',fontSize:11,fontFamily:'var(--mono)',width:50,outline:'none'}
              })
            ),
            h('td',{style:{padding:'7px'}},
              h('input',{type:'number',min:0,step:1,placeholder:'0',value:ri.pers_sub,
                onChange:function(e){upd('pers_sub',e.target.value);},
                style:{background:'rgba(168,85,247,.1)',border:'1px solid rgba(168,85,247,.3)',borderRadius:5,
                  padding:'3px 5px',color:'var(--purple)',fontSize:11,fontFamily:'var(--mono)',width:46,outline:'none'}
              })
            ),
            h('td',{style:{padding:'7px'}},
              h('input',{type:'number',min:0,step:1,placeholder:'0',value:ri.pers_casa,
                onChange:function(e){upd('pers_casa',e.target.value);},
                style:{background:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.3)',borderRadius:5,
                  padding:'3px 5px',color:'var(--green)',fontSize:11,fontFamily:'var(--mono)',width:46,outline:'none'}
              })
            ),
            h('td',{style:{padding:'7px',fontFamily:'var(--mono)',fontWeight:700,
              color:isFalta?'var(--red)':'var(--text2)',fontSize:11}},
              personal>0?personal+(isFalta?'⚠':''):'—'
            ),
            h('td',{style:{padding:'7px',fontFamily:'var(--mono)',fontWeight:700,color:rrColor}},rendReal>0?rendReal.toFixed(1):'—'),

function CubicView({saves,cubicData,onCubicSave,auth,toast}){
  var[fase,setFase]=useState('1');

  var[searchQ,setSearchQ]=useState('');
  var isAdmin=auth&&(auth.role==='Admin'||auth.role==='Jefe Obra');
  var mat=cubicData.mat||{};
  var allDeps=Object.keys(_D.ds);
  var total=allDeps.length;

  function depStat(f,pid){
    var lk=f==='1'?_D.lf1:f==='2'?_D.lf2:_D.lf3;
    var comp=0,avanz=0,usado=0,sinInic=0;
    allDeps.forEach(function(d){
      var sv=saves&&saves[d];
      var v=sv&&sv['f'+f]&&sv['f'+f][pid]!=null?sv['f'+f][pid]:(lk[d]?(lk[d][pid]||0):0);
      usado+=v/100; // porcentaje real
      if(v>=100)comp++;else if(v>0)avanz++;else sinInic++;
    });
    usado=Math.round(usado*100)/100;
    var faltan=Math.round((total-usado)*100)/100;
    return{comp:comp,avanz:avanz,usado:usado,faltan:faltan,sinInic:sinInic};
  }

  function saveMat(pkey,mats){
    var nm=Object.assign({},mat);nm[pkey]=mats;
    onCubicSave(Object.assign({},cubicData,{mat:nm}));
  }

  var partidas=fase==='1'?_D.ps:fase==='2'?_D.ps2:_D.ps3;
  var fc=fase==='1'?'var(--blue)':fase==='2'?'var(--purple)':'var(--green)';

        var rows_=(raw.rows||[]);
        return rows_.some(function(row){
          var lleg=(row.qtys||[]).reduce(function(s,q){return s+(parseFloat(q)||0);},0);
          var cantD=parseFloat(row.cantDepto)||0;
          var nec=cantD>0?Math.ceil(cantD*total):0;
          var sp=nec>0?Math.round(lleg/nec*100):100;
          return lleg>0&&sp<30;
        });
      })();
      var nm=p.name.replace(/^F[0-9]+ /,'');
      var progW=Math.round(st.usado/total*100);
      return h('div',{key:p.id,
        onClick:function(){setSel(p);},
        style:{background:'var(--card)',border:'1px solid '+(hasCrit?'rgba(239,68,68,.4)':'var(--border)'),

          display:'flex',alignItems:'center',gap:10,transition:'border-color .15s',
          borderLeft:'3px solid '+fc}
      },
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{style:{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:6,
            overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}},nm),
          h('div',{style:{height:4,background:'var(--bg2)',borderRadius:2,overflow:'hidden',display:'flex',marginBottom:5}},
            h('div',{style:{width:Math.round(st.comp/total*100)+'%',background:'var(--green)'}}),
            h('div',{style:{width:Math.round(st.avanz/total*100)+'%',background:'var(--amber)'}})
          ),
          h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
            h('span',{style:{fontSize:10,color:'var(--text3)'}},st.comp+' ✓ · '+st.avanz+' ~ · '+st.sinInic+' pend'),
            mats.length>0&&h('span',{style:{fontSize:10,padding:'1px 7px',borderRadius:20,
              background:hasCrit?'rgba(239,68,68,.12)':'rgba(14,165,233,.1)',
              color:hasCrit?'var(--red)':'var(--blue)'}},
              mats.length+' mat'+(mats.length!==1?'s':'')+(hasCrit?' ⚠':''))
          )
        ),
        h('span',{style:{color:'var(--text3)',fontSize:16,flexShrink:0}},'›')
      );
    }))
  );
}


function LogisticaView({logData,onLogSave,auth,toast}){
  var today=new Date();
  var[yr,setYr]=useState(today.getFullYear());
  var[mo,setMo]=useState(today.getMonth()); // 0-indexed
  var[addDay,setAddDay]=useState(null);      // 'YYYY-MM-DD' of open form
  var[draft,setDraft]=useState({name:'',ud:'rollo',qty:''});
  var isAdmin=auth&&(auth.role==='Admin'||auth.role==='Jefe Obra');
  var canEdit=auth&&(auth.role==='Admin'||auth.role==='Jefe Obra'||auth.role==='Supervisor');

  var MONTH_NAMES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var DAY_NAMES=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  var UNITS=['un','kg','ton','m²','m³','ml','caja','saco','rollo','plancha','palmeta','balde','tubo','barra','paquete','palet','galón'];

  // Build calendar grid
  var firstDow=(new Date(yr,mo,1).getDay()+6)%7; // Mon=0
  var lastDate=new Date(yr,mo+1,0).getDate();
  var cells=[];
  for(var i=0;i<firstDow;i++)cells.push(null);
  for(var d=1;d<=lastDate;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  var weeks=[];
  for(var w=0;w<cells.length;w+=7)weeks.push(cells.slice(w,w+7));

  var todayStr=today.toISOString().slice(0,10);

  function dKey(d){
    return yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  }
  function prevMo(){if(mo===0){setMo(11);setYr(yr-1);}else setMo(mo-1);setAddDay(null);}
  function nextMo(){if(mo===11){setMo(0);setYr(yr+1);}else setMo(mo+1);setAddDay(null);}

  function addEntry(key){
    if(!draft.name.trim())return;
    var ex=(logData[key]||[]).slice();
    ex.push({name:draft.name.trim(),ud:draft.ud,qty:draft.qty});
    onLogSave(Object.assign({},logData,{[key]:ex}));
    setDraft({name:'',ud:'rollo',qty:''});
    setAddDay(null);
    toast&&toast('✓ Registrado');
  }
  function delEntry(key,idx){
    var ex=(logData[key]||[]).filter(function(_,i){return i!==idx;});
    onLogSave(Object.assign({},logData,{[key]:ex}));
  }

  return h('div',{className:'page'},
    // ── HEADER ──
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}},
      h('div',null,
        h('div',{style:{fontSize:18,fontWeight:700,letterSpacing:'.1em',color:'var(--text)',textTransform:'uppercase'}},'Logística'),
        h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:2}},'Registro de llegadas de material')
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:8}},
        h('button',{onClick:prevMo,style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,padding:'5px 11px',color:'var(--text2)',cursor:'pointer',fontSize:14}},'‹'),
        h('span',{style:{fontSize:13,fontWeight:700,color:'var(--text)',minWidth:130,textAlign:'center'}},MONTH_NAMES[mo]+' '+yr),
        h('button',{onClick:nextMo,style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,padding:'5px 11px',color:'var(--text2)',cursor:'pointer',fontSize:14}},'›')
      )
    ),
    // ── CALENDAR ──
    h('div',{style:{overflowX:'auto'}},
      h('div',{style:{minWidth:560}},
        // Day headers
        h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,marginBottom:3}},
          DAY_NAMES.map(function(dn,i){
            return h('div',{key:i,style:{
              textAlign:'center',fontSize:10,fontWeight:700,letterSpacing:'.08em',
              color:i>=5?'var(--amber)':'var(--text3)',
              padding:'5px 0',textTransform:'uppercase'
            }},dn);
          })
        ),
        // Weeks
        weeks.map(function(week,wi){
          return h('div',{key:wi,style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,marginBottom:3}},
            week.map(function(day,di){
              if(!day)return h('div',{key:di,style:{background:'rgba(6,13,24,.4)',borderRadius:8,minHeight:90}});
              var key=dKey(day);
              var entries=logData[key]||[];
              var isToday=key===todayStr;
              var isWeekend=di>=5;
              var isAdding=addDay===key;
              return h('div',{key:di,style:{
                background:isToday?'rgba(14,165,233,.1)':'var(--card)',
                border:'1px solid '+(isToday?'rgba(14,165,233,.4)':'var(--border)'),
                borderRadius:8,padding:'6px 7px',minHeight:90,
                display:'flex',flexDirection:'column',gap:4,
                transition:'border-color .15s'
              }},
                // Day number
                h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:2}},
                  h('span',{style:{
                    fontSize:12,fontWeight:700,fontFamily:'var(--mono)',
                    color:isToday?'var(--blue)':isWeekend?'var(--amber)':'var(--text2)',
                    background:isToday?'rgba(14,165,233,.15)':'transparent',
                    borderRadius:4,padding:isToday?'1px 5px':'0'
                  }},day),
                  entries.length>0&&h('span',{style:{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)'}},entries.length)
                ),
                // Entries
                entries.map(function(e,ei){
                  return h('div',{key:ei,style:{
                    background:'rgba(14,165,233,.07)',borderRadius:5,
                    padding:'3px 5px',fontSize:10,color:'var(--text)',
                    display:'flex',alignItems:'flex-start',gap:3,lineHeight:1.3
                  }},
                    h('span',{style:{flex:1,wordBreak:'break-word'}},
                      (e.qty?e.qty+' '+e.ud+' ':'')+e.name
                    ),
                    canEdit&&h('button',{onClick:function(){delEntry(key,ei);},
                      style:{background:'transparent',border:'none',color:'var(--text3)',cursor:'pointer',
                        fontSize:10,padding:0,lineHeight:1,flexShrink:0}
                    },'×')
                  );
                }),
                // Add form (inline)
                isAdding&&h('div',{style:{display:'flex',flexDirection:'column',gap:3,marginTop:2}},
                  h('input',{type:'text',autoFocus:true,placeholder:'Material...',value:draft.name,
                    onChange:function(e){setDraft(Object.assign({},draft,{name:e.target.value}));},
                    onKeyDown:function(e){if(e.key==='Enter')addEntry(key);if(e.key==='Escape')setAddDay(null);},
                    style:{background:'var(--bg2)',border:'1px solid var(--blue)',borderRadius:4,
                      padding:'3px 5px',color:'var(--text)',fontSize:10,outline:'none',width:'100%',boxSizing:'border-box'}
                  }),
                  h('div',{style:{display:'flex',gap:3}},
                    h('input',{type:'text',placeholder:'Cant.',value:draft.qty,
                      onChange:function(e){setDraft(Object.assign({},draft,{qty:e.target.value}));},
                      style:{flex:'0 0 42px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:4,
                        padding:'3px 4px',color:'var(--text)',fontSize:10,outline:'none',boxSizing:'border-box'}
                    }),
                    h('select',{value:draft.ud,
                      onChange:function(e){setDraft(Object.assign({},draft,{ud:e.target.value}));},
                      style:{flex:1,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:4,
                        padding:'3px 2px',color:'var(--text2)',fontSize:10,outline:'none'}
                    },UNITS.map(function(u){return h('option',{key:u,value:u},u);}))
                  ),
                  h('div',{style:{display:'flex',gap:3}},
                    h('button',{onClick:function(){addEntry(key);},
                      style:{flex:1,padding:'3px 0',borderRadius:4,border:'none',background:'var(--blue)',
                        color:'#fff',fontSize:10,cursor:'pointer',fontWeight:600}
                    },'✓ OK'),
                    h('button',{onClick:function(){setAddDay(null);},
                      style:{padding:'3px 6px',borderRadius:4,border:'1px solid var(--border)',
                        background:'transparent',color:'var(--text3)',fontSize:10,cursor:'pointer'}
                    },'✕')
                  )
                ),
                // Add button
                canEdit&&!isAdding&&h('button',{
                  onClick:function(){setAddDay(key);setDraft({name:'',ud:'rollo',qty:''}); },
                  style:{marginTop:'auto',padding:'2px 0',borderRadius:4,border:'1px dashed rgba(14,165,233,.3)',
                    background:'transparent',color:'rgba(14,165,233,.5)',cursor:'pointer',fontSize:11,
                    width:'100%',lineHeight:1.4}
                },'+')
              );
            })
          );
        })
      )
    )
  );
}

function App({initialData}){
  const[state,ss]=useState(()=>{
    if(initialData&&Object.keys(initialData).length>0)return initialData;
    try{return JSON.parse(localStorage.getItem(SK))||{};}catch{return{};}
  });
  // Real-time: merge Firebase updates from other users
  React.useEffect(function(){
    function onFbUpdate(e){
      var remote=e.detail;if(!remote)return;
      ss(function(cur){return Object.assign({},remote,{auth:cur.auth,tab:cur.tab});});
    }
    window.addEventListener('fb-update',onFbUpdate);
    return function(){window.removeEventListener('fb-update',onFbUpdate);};
  },[]);
  const save=(patch)=>{
    const ns={...state,...patch};
    ss(ns);
    try{localStorage.setItem(SK,JSON.stringify(ns));}catch(e){}
    if(window.fbSave)window.fbSave(ns);
  };
  const[toastMsg,showToast]=useToast();
  const{auth,tab='dash',saves={},ganttData={},weekData={},rendData={},cubicData={},logData={}}=state;
  if(!auth)return h(Login,{onLogin:(a)=>save({auth:a})});
  const setTab=(t)=>save({tab:t});
  const onSave=(dep,sv)=>save({saves:{...saves,[dep]:sv}});
  const onGanttSave=(gd)=>save({ganttData:gd});
  const onWeekSave=(wk,wd)=>save({weekData:{...weekData,[wk]:wd}});
  const onRendSave=(rd)=>save({rendData:rd});
  const onCubicSave=(cd)=>save({cubicData:cd});
  const onLogSave=(ld)=>save({logData:ld});
  const navTabs=[
    {id:'dash',icon:'◆',label:'Dashboard'},
    {id:'partidas',icon:'🔍',label:'Partidas'},
    {id:'pisos',icon:'⬢',label:'Pisos'},
    {id:'gantt',icon:'▤',label:'Gantt'},
    {id:'programa',icon:'📅',label:'Plan Pers.'},
    {id:'rendimiento',icon:'📊',label:'Rend.'},
    {id:'cubic',icon:'📦',label:'Cúbic'},
    {id:'logistica',icon:'🚛',label:'Logíst.'},
  ];
  let content;
  if(tab==='dash')content=h(Dashboard,{saves,ganttTasks:ganttData.tasks||[],weekData});
  else if(tab==='partidas')content=h(PartidasView,{saves,onSave,auth,toast:showToast});
  else if(tab==='pisos')content=h(PisosView,{saves,onSave,auth,toast:showToast});
  else if(tab==='gantt')content=h(GanttView,{ganttData,onGanttSave,auth,saves,toast:showToast});
  else if(tab==='programa')content=h(ProgramaView,{ganttData,saves,onWeekSave,weekData,auth,toast:showToast});
  else if(tab==='rendimiento')content=h(RendimientoView,{saves,rendData,onRendSave,auth,toast:showToast});
  else if(tab==='cubic')content=h(CubicView,{saves,cubicData,onCubicSave,auth,toast:showToast});
  else if(tab==='logistica')content=h(LogisticaView,{logData,onLogSave,auth,toast:showToast});
  else content=h(Dashboard,{saves});
  return h('div',{className:'app'},
    h('div',{className:'nav'},
      h('div',{style:{display:'flex',alignItems:'center',gap:8}},
        h('div',{style:{fontSize:17,fontWeight:700,letterSpacing:'.12em',color:'var(--blue)'}},'✦ OBRA'),
        h('span',{style:{width:7,height:7,borderRadius:'50%',display:'inline-block',
          background:'var(--green)',boxShadow:'0 0 6px var(--green)'},title:'Sincronizado con la nube'})
      ),
      h('div',{className:'flex aic g8'},
        h('span',{style:{fontSize:11,fontWeight:600,color:auth.role==='Admin'?'var(--blue)':auth.role==='Supervisor'?'var(--amber)':'var(--green)'}},auth.role),
        h('button',{onClick:()=>save({auth:null}),
          style:{background:'none',border:'1px solid var(--border)',borderRadius:6,padding:'4px 10px',color:'var(--text2)',fontSize:11,cursor:'pointer',letterSpacing:'.04em',transition:'all .15s'},
          onMouseOver:e=>{e.target.style.borderColor='var(--red)';e.target.style.color='var(--red)';},
          onMouseOut:e=>{e.target.style.borderColor='var(--border)';e.target.style.color='var(--text2)';}
        },'Salir')
      )
    ),
    h('div',{className:'main'+(tab==='gantt'?' main-gantt':'')},content),
    toastMsg&&h('div',{className:'toast',style:{background:toastMsg.color||'var(--green2)'}},toastMsg.m),
    h('div',{className:'bnav',ref:(el)=>{
        // Auto-scroll active tab into center view
        if(!el)return;
        var active=el.querySelector('.bnav-btn.on');
        if(active){
          var left=active.offsetLeft-el.clientWidth/2+active.clientWidth/2;
          el.scrollTo({left:Math.max(0,left),behavior:'smooth'});
        }
      }},
      navTabs.map(t=>
        h('button',{key:t.id,
          className:'bnav-btn'+(tab===t.id?' on':''),
          onClick:()=>setTab(t.id),
          style:{position:'relative'}
        },
          tab===t.id&&h('div',{style:{position:'absolute',top:0,left:'20%',right:'20%',height:2,
            background:'var(--blue)',borderRadius:2,boxShadow:'0 0 6px rgba(14,165,233,.6)'}}),
          h('span',{className:'bnav-icon'},t.icon),
          t.label
        )
      )
    )
  );
}
