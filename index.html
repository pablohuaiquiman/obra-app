<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#060d18">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Gestión de Obra</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060d18;--bg2:#0a1628;--bg3:#0f1f38;
  --blue:#0ea5e9;--blue2:#38bdf8;
  --green:#22c55e;--green2:#16a34a;
  --amber:#f59e0b;--red:#ef4444;--purple:#a855f7;
  --cyan:#06b6d4;--teal:#14b8a6;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#475569;
  --border:#1e3a5f;--card:#0d1f3c;
  --font:'Barlow Condensed',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html,body,#root{height:100%;overflow:hidden}
@supports(height:100dvh){html,body,#root{height:100dvh}}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:16px;letter-spacing:.02em}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--font);outline:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.app::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(14,165,233,.12),transparent);pointer-events:none;z-index:0}
/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(6,13,24,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:10;flex-shrink:0;position:relative}
.nav-logo{font-size:18px;font-weight:700;letter-spacing:.12em;color:var(--blue);text-transform:uppercase}
/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:6px;padding:7px 16px;font-size:12px;color:var(--text3);background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;white-space:nowrap;position:relative;z-index:9}
.bc-btn{background:none;color:var(--text2);font-size:12px;font-family:var(--font);cursor:pointer;transition:color .15s;letter-spacing:.04em;padding:2px 0}
.bc-btn:hover{color:var(--blue)}
.bc-sep{color:var(--border);margin:0 2px}
/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;z-index:1}
.page{padding:14px;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* LOGIN */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{width:100%;max-width:340px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 24px;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.login-title{font-size:26px;font-weight:700;letter-spacing:.15em;color:var(--blue);text-align:center;margin-bottom:4px;text-transform:uppercase}
.login-sub{font-size:12px;color:var(--text3);text-align:center;margin-bottom:24px;letter-spacing:.05em}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--text2);text-transform:uppercase;margin-bottom:5px}
.field input,.field select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--text);font-size:14px;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--blue)}
.btn-primary{width:100%;background:var(--blue);color:#fff;padding:12px;border-radius:8px;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;transition:all .2s;margin-top:6px}
.btn-primary:hover{background:var(--blue2)}
.err-msg{color:var(--red);font-size:12px;text-align:center;margin-top:8px}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(14,165,233,.4),transparent)}
.card-title{font-size:10px;font-weight:600;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:6px}
.card-val{font-size:30px;font-weight:700;font-family:var(--mono);line-height:1}
/* GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.gap10{display:flex;flex-direction:column;gap:10px}
.gap8{display:flex;flex-direction:column;gap:8px}
/* PROGRESS */
.bar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.pr{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.pr-label{font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pr-val{font-family:var(--mono);font-size:12px;color:var(--text);min-width:36px;text-align:right}
/* PILLS */
.pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.07em;white-space:nowrap}
.pill-green{background:rgba(34,197,94,.15);color:var(--green)}
.pill-blue{background:rgba(14,165,233,.15);color:var(--blue)}
.pill-amber{background:rgba(245,158,11,.15);color:var(--amber)}
.pill-red{background:rgba(239,68,68,.15);color:var(--red)}
.pill-gray{background:rgba(148,163,184,.1);color:var(--text3)}
.pill-purple{background:rgba(168,85,247,.15);color:var(--purple)}
/* SECTION HDR */
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.shdr-title{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text2)}
/* FLOOR BTNS */
.floor-btn{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:left;transition:all .18s;position:relative;overflow:hidden;width:100%}
.floor-btn:active{border-color:var(--blue);background:rgba(14,165,233,.07)}
/* DEPTO GRID */
.depto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.depto-btn{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 7px;text-align:center;transition:all .18s;position:relative;cursor:pointer;width:100%}
.depto-btn:active{border-color:var(--blue);transform:scale(.97)}
/* FASE TABS */
.ftabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;flex-shrink:0}
.ftab{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:.05em;border:1px solid var(--border);background:none;color:var(--text2);transition:all .15s;white-space:nowrap}
.ftab.on{background:var(--blue);border-color:var(--blue);color:#fff}
/* PARTIDA LIST */
.p-item{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px;margin-bottom:7px;transition:border-color .15s}
.p-item.done{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.03)}
.p-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:9px}
.p-name{font-size:13px;color:var(--text);line-height:1.35;flex:1}
.p-badge{font-family:var(--mono);font-size:13px;font-weight:700;min-width:40px;text-align:right;flex-shrink:0}
.pct-btns{display:flex;gap:3px}
.pct-btn{flex:1;padding:7px 3px;border-radius:6px;font-size:12px;font-weight:700;font-family:var(--mono);background:var(--bg2);border:1px solid var(--border);color:var(--text2);transition:all .12s}
.pct-btn.sel{color:#fff;border-color:transparent}
/* SWITCH */
.sw{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.sw-track{width:36px;height:20px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);position:relative;transition:background .2s;flex-shrink:0}
.sw-track.on{background:var(--blue);border-color:var(--blue)}
.sw-thumb{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:7px;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.sw-track.on .sw-thumb{transform:translateX(16px)}
.sw-label{font-size:12px;color:var(--text2);letter-spacing:.04em}
/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:10px 14px 10px 38px;color:var(--text);font-size:14px;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--blue)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text3);pointer-events:none}
/* PARTIDA DETAIL CARD */
.pd-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.pd-head{padding:14px 14px 10px;border-bottom:1px solid var(--border)}
.pd-body{padding:12px 14px}
.pd-floor-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(30,58,95,.4);cursor:pointer;transition:background .15s;border-radius:4px}
.pd-floor-row:last-child{border-bottom:none}
.pd-floor-row:active{background:rgba(14,165,233,.06)}
/* GANTT */
.gt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.gt-table{border-collapse:collapse;font-size:12px;min-width:600px}
.gt-table th{background:var(--bg2);color:var(--text3);font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:3}
.gt-table td{padding:6px 10px;border-bottom:1px solid rgba(30,58,95,.3);vertical-align:middle}
.gt-table tr:hover td{background:rgba(14,165,233,.03)}
.gt-bar-cell{min-width:160px}
.gt-bar-wrap{background:var(--bg2);border-radius:3px;height:14px;position:relative;overflow:hidden}
.gt-bar-fill{height:100%;border-radius:3px;transition:width .4s ease;display:flex;align-items:center;padding-left:4px}
.gt-bar-pct{font-size:9px;font-weight:700;color:#fff;white-space:nowrap}
/* EDITABLE CELL */
.editable{cursor:pointer;border-radius:4px;padding:2px 4px;transition:background .15s;display:inline-block;min-width:30px}
.editable:hover{background:rgba(14,165,233,.12)}
.cell-input{background:var(--bg2);border:1px solid var(--blue);border-radius:4px;padding:2px 6px;color:var(--text);font-size:12px;font-family:var(--mono);width:100%;min-width:80px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s ease}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;padding:20px 16px 32px;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:16px;font-weight:700;letter-spacing:.08em;color:var(--text);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;color:var(--text3);font-size:20px;padding:4px 8px;border-radius:6px;transition:color .15s}
.modal-close:hover{color:var(--text)}
/* INLINE EDIT */
.ie-input{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;width:100%;transition:border-color .15s}
.ie-input:focus{border-color:var(--blue)}
.ie-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.ie-label{font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;min-width:72px;flex-shrink:0}
/* WEEKLY / PROGRAMA */
.wk-day{margin-bottom:14px}
.wk-day-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:8px}
.wk-day-name{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--blue)}
.wk-day-date{font-size:11px;color:var(--text3);font-family:var(--mono)}
.task-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 11px;display:flex;align-items:flex-start;gap:9px;margin-bottom:5px;transition:all .15s}
.task-item.done{opacity:.55}
.task-check{width:17px;height:17px;border-radius:4px;border:2px solid var(--border);background:none;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.task-check.on{background:var(--green);border-color:var(--green)}
.task-info{flex:1;min-width:0}
.task-name{font-size:13px;color:var(--text);line-height:1.3}
.task-meta{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap}
.task-del{background:none;color:var(--text3);padding:3px 6px;font-size:16px;transition:color .15s;flex-shrink:0;line-height:1}
.task-del:hover{color:var(--red)}
.add-row{display:flex;gap:7px;margin-top:8px}
.add-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;transition:border-color .2s}
.add-input:focus{border-color:var(--blue)}
.add-btn{background:var(--blue);color:#fff;padding:9px 14px;border-radius:8px;font-size:13px;font-weight:700}
/* DATE INPUT */
.date-input{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;font-family:var(--mono);width:100%}
.date-input:focus{border-color:var(--blue);outline:none}
/* SELECT */
.sel-input{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;width:100%}
.sel-input:focus{border-color:var(--blue);outline:none}
/* IMPORT AREA */
.import-area{width:100%;background:var(--bg);border:1px dashed var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:12px;font-family:var(--mono);resize:vertical;min-height:100px;line-height:1.5}
.import-area:focus{border-color:var(--blue);outline:none}
/* TOAST */
.toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);background:var(--green2);color:#fff;padding:9px 20px;border-radius:20px;font-size:12px;font-weight:700;z-index:200;animation:toastIn .25s ease;letter-spacing:.04em;box-shadow:0 4px 20px rgba(0,0,0,.4);white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* BOTTOM NAV */
.bnav{display:flex;background:rgba(6,13,24,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);flex-shrink:0;z-index:100;position:sticky;bottom:0;width:100%}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;background:none;color:var(--text3);font-size:10px;font-family:var(--font);letter-spacing:.03em;transition:all .15s;gap:3px;min-height:56px}
.bnav-btn.on,.bnav-btn:active{color:var(--blue)}
.bnav{padding-bottom:env(safe-area-inset-bottom,0)}
.bnav-icon{font-size:18px;line-height:1}
/* UTILS */
.flex{display:flex}.aic{align-items:center}.jb{justify-content:space-between}.g8{gap:8px}.g6{gap:6px}.g4{gap:4px}
.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}
.mono{font-family:var(--mono)}.w-full{width:100%}
.faze-1{color:var(--blue)}.faze-2{color:var(--purple)}.faze-3{color:var(--green)}
.text2{color:var(--text2)}.text3{color:var(--text3)}
.bold{font-weight:700}.upper{text-transform:uppercase}.ls{letter-spacing:.06em}
/* NOTA */
.nota-ta{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px;font-family:var(--font);resize:vertical;min-height:64px}
.nota-ta:focus{border-color:var(--blue);outline:none}
/* RESPONSIBLE TAG */
.resp-tag{background:rgba(168,85,247,.12);color:var(--purple);padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600}
.fase-tag{padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600}
</style>
</head>

<script>

// ── Helpers ──────────────────────────────────────────────
const pc=(v)=>v>=80?'var(--green)':v>=50?'var(--blue)':v>=25?'var(--amber)':'var(--red)';

const fcpill=(f)=>String(f)==='1'?'pill-blue':String(f)==='2'?'pill-purple':'pill-green';

function gv(dep,fase,pid){
  const lk=fase===1?_D.lf1:fase===2?_D.lf2:_D.lf3;
  const row=lk[String(dep)];
  if(!row)return 0;
  const v=row[String(pid)];
  return v!=null?v:0;
}
function flAvg(fl,fase){
  const deps=_D.fl[fl]||[];
  const vals=deps.map(d=>{const ds=_D.ds[d];return ds?ds['f'+fase]:0;}).filter(v=>v!=null);
  if(!vals.length)return 0;
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*10)/10;
}
function partAvgByFloor(fl,fase,pid){
  const deps=_D.fl[fl]||[];
  const vals=deps.map(d=>gv(d,fase,pid));
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
}

function Bar({val,color,h:ht=6}){

}

// ── Switch ──
function Switch({on,onChange,label}){
  return h('label',{className:'sw',onClick:()=>onChange(!on)},

}

// ── Toast hook ──
function useToast(){
  const[msg,setMsg]=useState(null);
  const ref=useRef();
  const show=(m,color='var(--green2)')=>{
    setMsg({m,color});
    clearTimeout(ref.current);
    ref.current=setTimeout(()=>setMsg(null),1900);
  };
  return[msg,show];
}

function Login({onLogin}){

// ── DASHBOARD ─────────────────────────────────────────────
function Dashboard({saves,ganttTasks}){
  const allD=Object.keys(_D.ds);
  const tot=allD.length;
  const overall=Math.round(allD.reduce((s,d)=>s+_D.ds[d].overall,0)/tot*10)/10;
  const f1=Math.round(allD.reduce((s,d)=>s+_D.ds[d].f1,0)/tot*10)/10;
  const f2=Math.round(allD.reduce((s,d)=>s+_D.ds[d].f2,0)/tot*10)/10;
  const f3=Math.round(allD.reduce((s,d)=>s+_D.ds[d].f3,0)/tot*10)/10;
  const getOverall=(d)=>{
    const sv=saves[d];
    if(!sv)return _D.ds[d].overall;
    // Recompute from saves
    let total=0,count=0;
    [['f1',_D.ps,1],['f2',_D.ps2,2],['f3',_D.ps3,3]].forEach(([fk,ps,fi])=>{
      ps.forEach(p=>{
        const v=sv[fk]&&sv[fk][p.id]!=null?sv[fk][p.id]:(_D['lf'+fi][d]?_D['lf'+fi][d][p.id]||0:0);
        total+=v;count++;
      });
    });
    return count?Math.round(total/count*10)/10:_D.ds[d].overall;
  };
  const complete=allD.filter(d=>getOverall(d)>=99).length;
  const inprog=allD.filter(d=>{const v=getOverall(d);return v>0&&v<99;}).length;
  const overall2=Math.round(allD.reduce((s,d)=>s+getOverall(d),0)/tot*10)/10;
  const floors=Object.keys(_D.fl);

  return h('div',{className:'page gap10'},
    h('div',{className:'grid3'},
      h('div',{className:'card',style:{background:'linear-gradient(135deg,var(--card),rgba(14,165,233,.07))'}},
        h('div',{className:'card-title'},'Avance Global'),
        h('div',{className:'card-val',style:{color:'var(--blue)',fontSize:32}},overall2+'%'),
        h('div',{className:'mt8'},h(Bar,{val:overall2}))
      ),
      h('div',{className:'card'},
        h('div',{className:'card-title'},'Deptos'),
        h('div',{className:'card-val',style:{fontSize:24}},tot),
        h('div',{style:{marginTop:3,fontSize:10,color:'var(--text3)'}},complete+' completos')
      ),
      h('div',{className:'card'},
        h('div',{className:'card-title'},'En Proceso'),
        h('div',{className:'card-val',style:{fontSize:24,color:'var(--amber)'}},inprog),
        h('div',{style:{marginTop:3,fontSize:10,color:'var(--text3)'}},
          (tot-inprog-complete)+' sin iniciar'
        )
      )
    ),
    h('div',{className:'card'},
      h('div',{className:'shdr'},h('div',{className:'shdr-title'},'Avance por Fase')),
      [['1',f1,'var(--blue)'],['2',f2,'var(--purple)'],['3',f3,'var(--green)']].map(([f,v,c])=>
        h('div',{key:f,className:'pr'},
          h('div',{style:{width:52,fontSize:12,fontWeight:600,color:c}},'Fase '+f),

            h('div',{className:'bar-fill',style:{width:`${v}%`,background:c}})
          ),
          h('div',{className:'pr-val',style:{color:c}},v+'%')
        )
      )
    ),
    h('div',{className:'card'},
      h('div',{className:'shdr'},h('div',{className:'shdr-title'},'Avance por Piso')),
      floors.map(fl=>{
        const a1=flAvg(fl,'1'),a2=flAvg(fl,'2'),a3=flAvg(fl,'3');
        const tot2=Math.round((a1+a2+a3)/3*10)/10;
        return h('div',{key:fl,style:{marginBottom:10}},
          h('div',{className:'flex aic jb mb6'},
            h('span',{style:{fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:'var(--text2)'}},fl),
            h('span',{className:`pill ${pcl(tot2)}`},tot2+'%')

          h('div',{style:{display:'flex',gap:2,height:7}},

          const row=lk[dep];
          const v=row&&row[sel.id]!=null?row[sel.id]:0;
          const color=v>=100?'var(--green)':v>=50?'var(--blue)':v>0?'var(--amber)':'var(--text3)';
          return h('div',{key:dep,style:{background:'var(--card)',border:`1px solid ${v>=100?'rgba(34,197,94,.25)':'var(--border)'}`,borderRadius:9,padding:'10px 13px',display:'flex',alignItems:'center',gap:10}},
            h('span',{className:'mono',style:{fontSize:15,fontWeight:700,color:'var(--text)',minWidth:40}},dep),
            h('div',{style:{flex:1}},h(Bar,{val:v,color})),
            h('span',{className:'mono',style:{fontSize:12,fontWeight:700,color,minWidth:38,textAlign:'right'}},v+'%')
          );
        }),
        visibleDeps.length===0&&h('div',{style:{textAlign:'center',color:'var(--green)',padding:'20px 0',fontSize:13}},'✅ Todos los deptos al 100% en esta partida')
      )
    );
  }

  // ── Floor summary for a partida ──
  if(sel){
    const floors=Object.keys(_D.fl);
    const flData=floors.map(fl=>({fl,avg:partAvgByFloor(fl,sel.fase,sel.id)}));
    const total=Math.round(flData.reduce((s,x)=>s+x.avg,0)/flData.length);
    return h('div',{className:'page'},
      h('div',{className:'flex aic jb mb10'},
        h('button',{className:'bc-btn',style:{fontSize:13},onClick:()=>ssel(null)},'← Partidas'),
        h('div',{className:'flex aic g8'},
          h(Switch,{on:hideDone,onChange:shd,label:'Ocultar 100%'}),
          h('div',{className:`pill ${fcpill(sel.fase)}`},'Fase '+sel.fase)
        )
      ),
      h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,overflow:'hidden',marginBottom:10}},
        h('div',{style:{padding:'13px 14px 10px',borderBottom:'1px solid var(--border)'}},
          h('div',{style:{fontSize:14,fontWeight:700,color:'var(--text)',lineHeight:1.3,marginBottom:8}},sel.name),
          h('div',{className:'flex aic g8'},
            h('span',{style:{fontSize:11,color:'var(--text3)'}},'Promedio general:'),
            h('span',{className:'mono',style:{fontSize:16,fontWeight:700,color:pc(total)}},total+'%')
          ),
          h('div',{style:{marginTop:6}},h(Bar,{val:total,color:fc(sel.fase)}))
        ),
        h('div',{style:{padding:'10px 14px'}},
          h('div',{style:{fontSize:10,color:'var(--text3)',marginBottom:8,letterSpacing:'.05em'}},'TOCA UN PISO PARA VER DETALLE POR DEPTO'),
          floors.map(fl=>{
            const avg=flData.find(x=>x.fl===fl)?.avg||0;
            if(hideDone&&avg>=100)return null;
            return h('div',{key:fl,onClick:()=>sfld(fl),
              style:{display:'flex',alignItems:'center',gap:8,padding:'8px 0',borderBottom:'1px solid rgba(30,58,95,.4)',cursor:'pointer',borderRadius:4,transition:'background .15s'}
            },
              h('span',{style:{fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:'var(--text2)',minWidth:60}},fl),
              h('div',{style:{flex:1}},h(Bar,{val:avg,color:fc(sel.fase)})),
              h('span',{className:'mono',style:{fontSize:12,fontWeight:700,color:pc(avg),minWidth:38,textAlign:'right'}},avg+'%'),
              h('span',{style:{color:'var(--text3)',fontSize:14,marginLeft:2}})
            );
          })
        )
      )
    );
  }

  // ── Search list ──
  return h('div',{className:'page'},
    h('div',{className:'flex aic jb mb10'},
      h('div',{className:'shdr-title'},'Buscar Partida'),
      h(Switch,{on:hideDone,onChange:shd,label:'Ocultar 100%'})
    ),
    h('div',{className:'search-wrap'},
      h('span',{className:'search-icon'},'🔍'),
      h('input',{value:q,onChange:e=>sq(e.target.value),placeholder:'Buscar por nombre o número...'})
    ),
    h('div',{className:'ftabs'},
      [{k:'all',l:'Todas'},{k:'F1',l:'Fase 1'},{k:'F2',l:'Fase 2'},{k:'F3',l:'Fase 3'}].map(({k,l})=>
        h('button',{key:k,className:`ftab ${(k==='all'&&q==='')||(k!=='all'&&q===k)?'on':''}`,

        },l)
      )
    ),
    h('div',{className:'gap8'},
      filtered.slice(0,100).map(p=>{
        const overallPct=Math.round(Object.keys(_D.fl).reduce((s,fl)=>s+partAvgByFloor(fl,p.fase,p.id),0)/Object.keys(_D.fl).length);

        return h('button',{key:`${p.fase}-${p.id}`,
          style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:9,padding:'10px 13px',textAlign:'left',width:'100%',transition:'all .15s',display:'block'},

        },
          h('div',{className:'flex aic'},
            h('div',{style:{flex:1}},
              h('div',{style:{fontSize:13,color:'var(--text)',lineHeight:1.3}},
                h('span',{className:'mono',style:{fontSize:10,color:'var(--text3)',marginRight:6}},'F'+p.fase+'-'+p.id),
                p.name
              )
            ),
            h('div',{className:'flex aic g6'},
              h('span',{className:'mono',style:{fontSize:12,fontWeight:700,color:pc(overallPct)}},overallPct+'%'),
              h('span',{className:`pill ${fcpill(p.fase)}`},'F'+p.fase)
            )
          )
        );
      })
    )
  );
}

// ── PISOS VIEW ─────────────────────────────────────────────
function PisosView({saves,onSave,toast}){
  const[floor,sf]=useState(null);
  const[dep,sd]=useState(null);
  const[hideDone,shd]=useState(false);
  const[fase,sfase]=useState('all');
  const[filt,sfilt]=useState('all');
  const floors=Object.keys(_D.fl);

  // ── Depto partidas view ──
  if(dep){
    const sv=saves[dep]||{f1:{},f2:{},f3:{}};
    const ds=_D.ds[dep];
    const setVal=(f,pid,v)=>{
      const ns={...sv};
      if(!ns['f'+f])ns['f'+f]={};
      ns['f'+f]={...ns['f'+f],[pid]:v};
      onSave(dep,ns);
      toast('✓ Guardado');
    };
    const getPartidas=(f)=>{
      const ps=f==='1'?_D.ps:f==='2'?_D.ps2:_D.ps3;
      return ps.map(p=>{
        const excel=gv(dep,parseInt(f),p.id);
        const saved=sv['f'+f]&&sv['f'+f][p.id]!=null?sv['f'+f][p.id]:null;
        return{...p,val:saved!=null?saved:excel};
      });
    };
    const fases2=fase==='all'?['1','2','3']:[fase];
    const calcAvg=(f)=>{
      const ps=getPartidas(f);
      if(!ps.length)return 0;
      return Math.round(ps.reduce((s,p)=>s+p.val,0)/ps.length*10)/10;
    };
    return h('div',{className:'page'},
      h('div',{className:'flex aic jb mb10'},
        h('button',{className:'bc-btn',style:{fontSize:13},onClick:()=>sd(null)},'← '+floor.toUpperCase()),
        h(Switch,{on:hideDone,onChange:shd,label:'Ocultar 100%'})
      ),
      h('div',{style:{background:'var(--bg2)',borderRadius:9,padding:'11px 13px',marginBottom:12}},
        h('div',{className:'flex aic jb mb6'},
          h('span',{className:'mono',style:{fontSize:15,fontWeight:700}},'Depto '+dep),
          h('span',{className:`pill ${pcl(ds.overall)}`},Math.round(ds.overall)+'% total')
        ),
        h('div',{className:'flex g8'},
          ['1','2','3'].map(f=>
            h('div',{key:f,style:{flex:1,textAlign:'center'}},
              h('div',{style:{fontSize:9,color:'var(--text3)',letterSpacing:'.06em'}},'F'+f),
              h('div',{className:'mono',style:{fontSize:13,fontWeight:700,color:fc(f),marginTop:2}},calcAvg(f)+'%'),
              h(Bar,{val:calcAvg(f),color:fc(f),h:3})
            )
          )
        )
      ),
      h('div',{className:'ftabs'},
        [['all','Todo'],['1','Fase 1'],['2','Fase 2'],['3','Fase 3']].map(([k,l])=>
          h('button',{key:k,className:`ftab ${fase===k?'on':''}`,
            style:k!=='all'&&fase===k?{background:fc(k),borderColor:fc(k)}:{},
            onClick:()=>sfase(k)
          },l)
        )
      ),
      fases2.map(f=>{
        let parts=getPartidas(f);
        if(hideDone)parts=parts.filter(p=>p.val<100);
        if(!parts.length)return h('div',{key:f,style:{textAlign:'center',color:'var(--green)',padding:'18px 0',fontSize:13}},'✅ Todas las partidas al 100%');
        return h('div',{key:f},
          h('div',{style:{fontSize:10,fontWeight:700,color:fc(f),letterSpacing:'.1em',textTransform:'uppercase',marginBottom:7,marginTop:f!=='1'||fase!=='all'?10:0,paddingBottom:3,borderBottom:`1px solid ${fc(f)}33`}},
            'Fase '+f+' · '+parts.length+(hideDone?' visibles':' partidas')
          ),
          parts.map(p=>{
            const v=p.val;
            const color=v>=100?'var(--green)':v>=50?'var(--blue)':v>0?'var(--amber)':'var(--text3)';
            return h('div',{key:p.id,className:`p-item${v>=100?' done':''}`,style:v>=100?{borderColor:'rgba(34,197,94,.2)'}:{}},
              h('div',{className:'p-hdr'},
                h('div',{className:'p-name'},
                  h('span',{className:'mono',style:{fontSize:9,color:'var(--text3)',marginRight:5}},'#'+p.id),
                  p.name
                ),
                h('div',{className:'p-badge',style:{color}},v+'%')
              ),
              h('div',{className:'pct-btns'},
                [0,25,50,75,100].map(pct=>
                  h('button',{key:pct,className:`pct-btn${v===pct?' sel':''}`,
                    style:v===pct?{background:color,borderColor:color}:{},
                    onClick:()=>setVal(f,p.id,pct)
                  },pct)
                )
              )
            );
          })
        );
      })
    );
  }

  // ── Floor depto grid ──
  if(floor){
    const deps=_D.fl[floor]||[];
    const fd=deps.filter(d=>{
      if(filt==='all')return true;
      const ds=_D.ds[d];
      if(filt==='act')return ds.overall>0&&ds.overall<99;
      if(filt==='done')return ds.overall>=99;
      if(filt==='pend')return ds.overall===0;
      return true;
    });
    return h('div',{className:'page'},
      h('div',{className:'flex aic jb mb12'},
        h('button',{className:'bc-btn',style:{fontSize:13},onClick:()=>{sf(null);sfilt('all');}},
          '← Pisos'
        ),
        h(Switch,{on:hideDone,onChange:shd,label:'Ocultar 100%'})
      ),
      h('div',{className:'ftabs'},
        [['all','Todos'],['act','En proceso'],['done','Completos'],['pend','Sin iniciar']].map(([k,l])=>
          h('button',{key:k,className:`ftab ${filt===k?'on':''}`,onClick:()=>sfilt(k)},l)
        )
      ),
      fd.length===0&&h('div',{style:{textAlign:'center',color:'var(--text3)',padding:'24px 0',fontSize:13}},'No hay departamentos con ese filtro'),
      h('div',{className:'depto-grid'},
        fd.map(dep=>{
          const ds=_D.ds[dep];
          const color=pc(ds.overall);
          return h('button',{key:dep,className:'depto-btn',onClick:()=>sd(dep)},
            h('div',{className:'mono',style:{fontSize:16,fontWeight:700,color:'var(--text)'}},dep),
            h('div',{className:'mono',style:{fontSize:12,fontWeight:700,color,marginTop:2}},Math.round(ds.overall)+'%'),
            h('div',{style:{display:'flex',gap:2,marginTop:5,justifyContent:'center'}},
              ['1','2','3'].map(f=>
                h('div',{key:f,style:{flex:1,height:3,borderRadius:2,background:fc(f),opacity:.15+.85*(ds['f'+f]/100)}})
              )
            )
          );
        })
      )
    );
  }

  // ── Floor select ──
  return h('div',{className:'page'},
    h('div',{className:'flex aic jb mb10'},
      h('div',{className:'shdr-title'},'Seleccionar Piso'),
      h(Switch,{on:hideDone,onChange:shd,label:'Ocultar 100%'})
    ),
    h('div',{className:'gap10'},
      floors.map(fl=>{
        const a1=flAvg(fl,'1'),a2=flAvg(fl,'2'),a3=flAvg(fl,'3');
        const tot=Math.round((a1+a2+a3)/3*10)/10;
        return h('button',{key:fl,className:'floor-btn',onClick:()=>{sf(fl);sfilt('all');}},
          h('div',{style:{position:'absolute',right:12,top:12}},
            h('span',{className:`pill ${pcl(tot)}`},tot+'%')
          ),
          h('div',{style:{fontSize:17,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--text)',marginBottom:2}},fl),
          h('div',{style:{fontSize:11,color:'var(--text3)',marginBottom:10}},_D.fl[fl].length+' departamentos'),
          h('div',{style:{display:'flex',gap:6}},
            [['1',a1,'var(--blue)'],['2',a2,'var(--purple)'],['3',a3,'var(--green)']].map(([f,v,c])=>
              h('div',{key:f,style:{flex:1}},
                h('div',{style:{fontSize:9,color:'var(--text3)',letterSpacing:'.06em',marginBottom:2}},'F'+f),
                h('div',{className:'mono',style:{fontSize:13,fontWeight:700,color:c,marginTop:1,marginBottom:2}},v+'%'),
                h(Bar,{val:v,color:c,h:3})
              )
            )
          )
        );
      })
    )
  );
}

                    h('div',{style:{width:3,height:16,background:faseColor(sub.fase),borderRadius:2,flexShrink:0}}),
                    h('div',{style:{flex:1}},
                      h('span',{style:{fontSize:12,color:'var(--text2)',fontWeight:600}},sub.name),
                      isSelFase&&h('span',{style:{marginLeft:6,fontSize:9,color:'var(--blue)'}},
                        '▼ partidas')
                    ),
                    h('div',{style:{width:70,textAlign:'center',flexShrink:0}},
                      h(EC,{id:sub.id,col:'resp',val:eff(sub.id,'resp',sub.resp),w:68,ph:'—'})
                    ),
                    h('span',{className:'mono',style:{width:28,textAlign:'right',fontSize:11,
                      fontWeight:700,color:sLate?'var(--red)':pc(sp),flexShrink:0}},sp+'%')
                  ),
                  h('div',{style:{flex:1,padding:'4px 8px',display:'flex',alignItems:'center'}},
                    h(TBar,{id:sub.id,pct:sp,start:eff(sub.id,'start',sub.start),

                ),
                // Partida drilldown rows
                isSelFase&&(()=>{

                  const lk=sub.fase==='1'?_D.lf1:sub.fase==='2'?_D.lf2:_D.lf3;
                  const sv=saves[sum.dep]||{};
                  const fk='f'+sub.fase;
                  return ps.map((p,idx)=>{
                    const excelVal=lk[sum.dep]?lk[sum.dep][p.id]||0:0;
                    const savedVal=sv[fk]&&sv[fk][p.id]!=null?sv[fk][p.id]:null;
                    const pval=savedVal!=null?savedVal:excelVal;
                    const pid='dp_'+sum.dep+'_f'+sub.fase+'_'+p.id;
                    const dates=getPDates(sum.dep,sub.fase,idx);
                    const pdStart=eff(pid,'start',dates.start);
                    const pdEnd=eff(pid,'end',dates.end);
                    const isLateP=pdEnd&&new Date(pdEnd)<TODAY&&pval<100;
                    return h(Row,{key:pid,minH:28,bgColor:'rgba(255,255,255,.01)',

                      )
                    );
                  });
                })()
              );

              h(TBar,{id:t.id,pct:t.pct||0,start:t.start,end:t.end,color:faseColor(t.fase)})

  // ── PARTIDA VIEW con selector depto ──
  const renderPartidaView=()=>{
    const filtered=allPartidaTasks.filter(t=>filtFase==='all'||t.fase===filtFase);
    const depList=['all',...Object.keys(_D.fl).reduce((a,fl)=>[...a,...(_D.fl[fl])],[])];
    const LW2=270;
    return h('div',{style:{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}},
      // Depto selector
      h('div',{style:{padding:'8px 14px',borderBottom:'1px solid var(--border)',flexShrink:0,
        display:'flex',alignItems:'center',gap:8}},
        h('span',{style:{fontSize:11,color:'var(--text3)',letterSpacing:'.06em'}},'DEPARTAMENTO:'),
        h('select',{className:'sel-input',style:{flex:1,maxWidth:200,fontSize:12,padding:'5px 8px'},

          h('option',{value:'all'},'Todos los deptos (promedio)'),

          )

          h('span',{style:{fontSize:9,color:'var(--text3)',width:28,textAlign:'right'}},'%')
        ),
        h('div',{style:{flex:1}},h(THeader))
      ),
      h('div',{style:{flex:1,overflowY:'auto'}},
        filtered.map((t,idx)=>{
          // Get value: if selDep, show that depto's value; else show avg
          let pval=t.pct;
          let pdStart=t.start,pdEnd=t.end;
          if(selDep){
            const lk=t.fase==='1'?_D.lf1:t.fase==='2'?_D.lf2:_D.lf3;
            const sv=saves[selDep]||{};

  // ── PLAN MAESTRO ──
  const renderPlanMaestro=()=>{
    const rows=GANTT_FULL.deptoTasks.filter(t=>!t.isSummary&&(filtFloor==='all'||t.floor===filtFloor)&&
      (filtFase==='all'||t.fase===filtFase));

    // Export to CSV
    const exportCSV=()=>{
      const lines=['Depto,Piso,Fase,Duración (días),Fecha Inicio,Fecha Fin,Responsable,% Avance'];
      rows.forEach(t=>{
        const ov=overrides[t.id]||{};
        const start=ov.start||t.start;
        const end=ov.end||t.end;
        const resp=ov.resp||t.resp||'';
        const pct=ov.pct!=null?ov.pct:t.pct;
        // Calculate duration in days
        const dur=start&&end?Math.round((new Date(end)-new Date(start))/(864e5)):0;
        lines.push(`${t.dep},${t.floor},Fase ${t.fase},${dur},${start},${end},${resp},${pct}`);
      });
      const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download='plan_maestro_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
      URL.revokeObjectURL(url);
      toast('✓ Plan Maestro exportado');
    };

    return h('div',{style:{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}},
      // Toolbar
      h('div',{style:{padding:'8px 14px',borderBottom:'1px solid var(--border)',flexShrink:0,

          rows.length+' filas · edita responsables y fechas directo en la tabla'),
        h('div',{style:{marginLeft:'auto',display:'flex',gap:6}},
          h('button',{onClick:exportCSV,
            style:{background:'var(--green2)',color:'#fff',borderRadius:7,padding:'6px 12px',
              fontSize:12,fontWeight:700,cursor:'pointer',border:'none'}},
            '⬇ Exportar CSV'
          ),
          isAdmin&&h('button',{onClick:()=>ssi(!showImport),
            style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:7,
              padding:'6px 10px',fontSize:12,color:'var(--text2)',cursor:'pointer'}},
            showImport?'✕':'⬆ Importar CSV'
          )
        )
      ),
      // Import panel
      showImport&&h('div',{style:{padding:'10px 14px',background:'var(--bg2)',
        borderBottom:'1px solid var(--border)',flexShrink:0}},
        h('div',{style:{fontSize:10,color:'var(--text3)',marginBottom:6,lineHeight:1.6}},
          'Formato: Depto, Piso, Fase, Duración(días), Inicio(AAAA-MM-DD), Fin(AAAA-MM-DD), Responsable, % Avance'),
        h('textarea',{className:'import-area',style:{minHeight:80},
          value:importText,onChange:e=>sit(e.target.value),
          placeholder:'Pega aquí el CSV exportado con fechas modificadas...'}),
        h('div',{className:'flex g8 mt8'},
          h('button',{onClick:()=>{
            const lines=importText.trim().split('\n').filter(l=>!l.startsWith('Depto'));
            const patches={};
            lines.forEach(line=>{
              const c=line.split(',').map(s=>s.trim());
              const[dep,,fase,dur,start,end,resp,pct]=c;
              const fnum=fase.replace(/\D/g,'');
              const id=`d_${dep}_f${fnum}`;
              patches[id]={start:start||'',end:end||'',resp:resp||'',pct:parseInt(pct)||0};
            });
            onGanttSave({...ganttData,overrides:{...overrides,...patches}});
            sit('');ssi(false);
            toast(`✓ ${Object.keys(patches).length} filas importadas`);
          },style:{background:'var(--blue)',color:'#fff',borderRadius:7,padding:'6px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}},'Aplicar'),
          h('button',{onClick:()=>{sit('');ssi(false);},
            style:{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:7,
              padding:'6px 12px',fontSize:12,color:'var(--text2)',cursor:'pointer'}},'Cancelar')
        )
      ),
      // Table
      h('div',{style:{flex:1,overflowY:'auto',overflowX:'auto'}},
        h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:12}},
          h('thead',null,
            h('tr',null,
              ['DEPTO','PISO','FASE','INICIO PLAN','FIN PLAN','RESPONSABLE','AVANCE'].map(col=>
                h('th',{key:col,style:{background:'var(--bg2)',padding:'7px 10px',

              const isLate=end&&new Date(end)<TODAY&&pct<100;
              const isDone=pct>=100;
              return h('tr',{key:t.id,style:{borderBottom:'1px solid rgba(30,58,95,.3)',

                h('td',{style:{padding:'6px 10px',fontFamily:'var(--mono)',fontWeight:700,color:'var(--text)'}},t.dep),
                h('td',{style:{padding:'6px 10px',color:'var(--text3)'}},t.floor),
                h('td',{style:{padding:'6px 10px'}},
                  h('span',{style:{background:faseColor(t.fase)+'22',color:faseColor(t.fase),
                    padding:'1px 7px',borderRadius:10,fontSize:10,fontWeight:600}},
                    'Fase '+t.fase)
                ),
                h('td',{style:{padding:'6px 10px'}},
                  h(EC,{id:t.id,col:'start',val:start,type:'date',w:105})
                ),
                h('td',{style:{padding:'6px 10px'}},
                  h(EC,{id:t.id,col:'end',val:end,type:'date',w:105})
                ),
                h('td',{style:{padding:'6px 10px'}},
                  h(EC,{id:t.id,col:'resp',val:resp,w:120,ph:'Sin asignar'})
                ),
                h('td',{style:{padding:'6px 10px'}},
                  h('div',{style:{display:'flex',alignItems:'center',gap:6}},
                    h('div',{style:{width:60,height:8,background:'var(--bg2)',borderRadius:3,overflow:'hidden'}},
                      h('div',{style:{height:'100%',width:`${pct}%`,
                        background:isDone?'var(--green)':isLate?'var(--red)':faseColor(t.fase),borderRadius:3}})
                    ),
                    h(EC,{id:t.id,col:'pct',val:pct,type:'number',w:40})
                  )
                )
              );
            })
          )
        )
      )
    );
  };

  const floors=['all','piso 2','piso 3','piso 4','piso 5','piso 6'];

  return h('div',{style:{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}},
    // Controls bar
    h('div',{style:{display:'flex',gap:6,padding:'8px 14px',flexWrap:'wrap',alignItems:'center',
      flexShrink:0,borderBottom:'1px solid var(--border)',background:'var(--bg)'}},
      // View toggle - 3 modes
      h('div',{style:{display:'flex',gap:3,background:'var(--bg2)',borderRadius:8,padding:3}},
        [['depto','Por Depto'],['partida','Por Partida'],['plan','Plan Maestro']].map(([k,l])=>
          h('button',{key:k,onClick:()=>{svm(k);if(k!=='depto'){ssd(null);ssf(null);}},
            style:{padding:'5px 10px',borderRadius:6,fontSize:11,fontWeight:600,border:'none',
              cursor:'pointer',whiteSpace:'nowrap',
              background:viewMode===k?( k==='plan'?'var(--teal)':'var(--blue)'):'none',
              color:viewMode===k?'#fff':'var(--text2)',transition:'all .15s'}}
          ,l)
        )
      ),
      viewMode==='depto'&&h('select',{className:'sel-input',
        style:{width:'auto',fontSize:11,padding:'5px 8px'},
        value:filtFloor,onChange:e=>sff(e.target.value)},
        floors.map(f=>h('option',{key:f,value:f},f==='all'?'Todos los pisos':f.replace('piso ','P')))
      ),
      viewMode!=='plan'&&h('select',{className:'sel-input',
        style:{width:'auto',fontSize:11,padding:'5px 8px'},
        value:filtFase,onChange:e=>sffe(e.target.value)},
        [{id:'all',name:'Todas'},{id:'1',name:'F1'},{id:'2',name:'F2'},{id:'3',name:'F3'}].map(f=>
          h('option',{key:f.id,value:f.id},f.name)
        )
      ),
      viewMode==='plan'&&h('select',{className:'sel-input',
        style:{width:'auto',fontSize:11,padding:'5px 8px'},
        value:filtFloor,onChange:e=>sff(e.target.value)},
        floors.map(f=>h('option',{key:f,value:f},f==='all'?'Todos los pisos':f.replace('piso ','Piso ')))
      ),
      viewMode==='plan'&&h('select',{className:'sel-input',
        style:{width:'auto',fontSize:11,padding:'5px 8px'},
        value:filtFase,onChange:e=>sffe(e.target.value)},
        [{id:'all',name:'Todas fases'},{id:'1',name:'Fase 1'},{id:'2',name:'Fase 2'},{id:'3',name:'Fase 3'}].map(f=>
          h('option',{key:f.id,value:f.id},f.name)
        )
      ),
      // Legend (only gantt views)
      viewMode!=='plan'&&h('div',{style:{display:'flex',gap:6,alignItems:'center',marginLeft:2}},
        h('div',{style:{width:10,height:2,background:'var(--amber)',borderRadius:1}}),
        h('span',{style:{fontSize:9,color:'var(--text3)'}},'Hoy'),
        h('div',{style:{width:10,height:8,background:'var(--green)',borderRadius:2}}),
        h('span',{style:{fontSize:9,color:'var(--text3)'}},'100%'),
        h('div',{style:{width:10,height:8,background:'var(--red)',borderRadius:2}}),
        h('span',{style:{fontSize:9,color:'var(--text3)'}},'Atrasado')
      ),
      viewMode==='depto'&&h('div',{style:{marginLeft:'auto',display:'flex',gap:5}},
        h('button',{
          onClick:()=>sexp(Object.fromEntries(GANTT_FULL.deptoTasks.filter(t=>t.isSummary).map(t=>[t.id,true]))),
          style:{background:'none',border:'1px solid var(--border)',borderRadius:6,
            padding:'4px 8px',fontSize:10,color:'var(--text3)',cursor:'pointer'}
        },'+ Todo'),
        h('button',{
          onClick:()=>{sexp(Object.fromEntries(GANTT_FULL.deptoTasks.filter(t=>t.isSummary).map(t=>[t.id,false])));ssd(null);ssf(null);},
          style:{background:'none',border:'1px solid var(--border)',borderRadius:6,
            padding:'4px 8px',fontSize:10,color:'var(--text3)',cursor:'pointer'}
        },'− Todo'),
        isAdmin&&h('button',{onClick:()=>ssa(!showAdd),
          style:{background:'var(--blue)',color:'#fff',borderRadius:6,
            padding:'5px 10px',fontSize:11,fontWeight:700,cursor:'pointer'}
        },'+ Tarea')
      ),
      // Add task modal
      showAdd&&h('div',{className:'modal-overlay',onClick:e=>e.target===e.currentTarget&&ssa(false)},
        h('div',{className:'modal'},
          h('div',{className:'modal-title'},'Nueva Tarea',
            h('button',{className:'modal-close',onClick:()=>ssa(false)},'×')
          ),
          [['Nombre','name','text'],['Responsable','resp','text'],
           ['Inicio','start','date'],['Fin','end','date'],
           ['Depto/Piso','dep','text'],['% Avance','pct','number']].map(([l,k,t])=>
            h('div',{key:k,className:'ie-row'},
              h('label',{className:'ie-label'},l),
              h('input',{className:'ie-input',type:t,value:newTask[k],
                onChange:e=>snt({...newTask,[k]:e.target.value})})
            )
          ),
          h('div',{className:'ie-row'},
            h('label',{className:'ie-label'},'Fase'),
            h('select',{className:'sel-input',value:newTask.fase,
              onChange:e=>snt({...newTask,fase:e.target.value})},
              [{id:'1',name:'Fase 1'},{id:'2',name:'Fase 2'},{id:'3',name:'Fase 3'}].map(f=>
                h('option',{key:f.id,value:f.id},f.name)
              )
            )
          ),
          h('button',{onClick:()=>{
            if(!newTask.name.trim())return;
            const id='ex_'+Date.now();
            onGanttSave({...ganttData,extraTasks:[...extraTasks,
              {...newTask,id,pct:parseInt(newTask.pct)||0}]});
            snt({name:'',fase:'1',resp:'',start:'',end:'',dep:'',pct:0});
            ssa(false);toast('✓ Tarea agregada');
          },className:'btn-primary',style:{marginTop:12}},'Agregar')
        )
      )
    ),
    !isAdmin&&viewMode!=='plan'&&h('div',{style:{padding:'3px 14px',fontSize:9,
      color:'var(--text3)',textAlign:'center',flexShrink:0,letterSpacing:'.04em'}},
      'Solo el Admin puede editar · Toca cualquier celda para modificar'),
    h('div',{style:{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}},
      viewMode==='depto'?renderDeptoView():
      viewMode==='partida'?renderPartidaView():
      renderPlanMaestro()
    )
  );
}


// ── PLAN MAESTRO VIEW ────────────────────────────────────
function ProgramaView({ganttData,saves,onWeekSave,weekData,auth,toast}){
  const fases=ganttData.fases||[
    {id:'1',name:'Fase 1',color:'var(--blue)'},
    {id:'2',name:'Fase 2',color:'var(--purple)'},
    {id:'3',name:'Fase 3',color:'var(--green)'}
  ];
  const tasks=ganttData.tasks&&ganttData.tasks.length?ganttData.tasks:GANTT_FULL.partidaTasks;

  const[filtFase,sff]=useState('all');
  const[filtResp,sfr]=useState('all');
  const[startDate,ssd]=useState(()=>{
    // Default: Monday of current week
    const d=new Date();
    const day=d.getDay();
    const diff=d.getDate()-day+(day===0?-6:1);
    d.setDate(diff);
    return d.toISOString().slice(0,10);
  });
  const[addModal,sam]=useState(false);
  const[newTask,snt]=useState({day:'',text:'',fase:'1',resp:''});

  // All responsibles
  const resps=[...new Set(tasks.map(t=>t.resp).filter(Boolean))];

  // Date helpers
  const parseDate=(s)=>s?new Date(s+'T12:00:00'):null;
  const fmtDate=(d)=>{
    if(!d)return'';
    return d.toLocaleDateString('es-CL',{day:'2-digit',month:'short'});
  };
  const dayNames=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

  // Build week days from startDate
  const weekDays=dayNames.map((_,i)=>{
    const d=new Date(startDate+'T12:00:00');
    d.setDate(d.getDate()+i);
    return{name:dayNames[i],date:d.toISOString().slice(0,10),display:d.toLocaleDateString('es-CL',{day:'2-digit',month:'short'})};
  });
  const endDate=weekDays[weekDays.length-1].date;

  // Filter gantt tasks that fall in this week
  const inRange=(t)=>{
    if(!t.start&&!t.end)return false;
    const ts=parseDate(t.start);
    const te=parseDate(t.end);
    const ws=parseDate(startDate);
    const we=parseDate(endDate);
    if(ts&&te)return ts<=we&&te>=ws;
    if(ts)return ts>=ws&&ts<=we;
    if(te)return te>=ws&&te<=we;
    return false;
  };

  const byFase=(t)=>filtFase==='all'||t.fase===filtFase;
  const byResp=(t)=>filtResp==='all'||t.resp===filtResp;

  // gantt tasks for this week, filtered
  const weekGanttTasks=tasks.filter(t=>inRange(t)&&byFase(t)&&byResp(t));

  // Manual tasks (stored per week key)
  const wk=startDate;
  const manualData=weekData[wk]||{tasks:{},nota:''};
  const addManual=(day,text)=>{
    if(!text.trim())return;
    const nd={...manualData};
    if(!nd.tasks[day])nd.tasks[day]=[];
    nd.tasks[day]=[...nd.tasks[day],{id:Date.now(),text,done:false,fase:newTask.fase,resp:newTask.resp}];
    onWeekSave(wk,nd);
    toast('✓ Tarea agregada');
  };
  const toggleManual=(day,id)=>{
    const nd={...manualData};
    nd.tasks[day]=(nd.tasks[day]||[]).map(t=>t.id===id?{...t,done:!t.done}:t);
    onWeekSave(wk,nd);
  };
  const delManual=(day,id)=>{
    const nd={...manualData};
    nd.tasks[day]=(nd.tasks[day]||[]).filter(t=>t.id!==id);
    onWeekSave(wk,nd);
  };
  const saveNota=(v)=>{
    onWeekSave(wk,{...manualData,nota:v});
  };

  // Per-day: assign gantt tasks to days they cover
  const tasksForDay=(dayDate)=>
    weekGanttTasks.filter(t=>{
      const ts=parseDate(t.start);
      const te=parseDate(t.end);
      const d=parseDate(dayDate);
      if(!ts&&!te)return false;
      if(ts&&te)return d>=ts&&d<=te;
      if(ts)return ts.toISOString().slice(0,10)===dayDate;
      if(te)return te.toISOString().slice(0,10)===dayDate;
      return false;
    });

  const faseInfo=(fid)=>fases.find(f=>f.id===fid)||{name:'F'+fid,color:'var(--text3)'};

  // Add day input state per day
  const[dayInput,sdi]=useState({});

  const navWeek=(dir)=>{
    const d=new Date(startDate+'T12:00:00');
    d.setDate(d.getDate()+dir*7);
    ssd(d.toISOString().slice(0,10));
  };

  return h('div',{className:'page'},
    // Filters bar
    h('div',{className:'card mb10'},
      h('div',{className:'flex aic jb mb8'},
        h('div',{className:'shdr-title'},'Filtros'),
        h('div',{className:'flex g6 aic'},
          h('button',{onClick:()=>navWeek(-1),style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,padding:'5px 10px',color:'var(--text2)',cursor:'pointer',fontSize:14}},'‹'),
          h('span',{className:'mono',style:{fontSize:11,color:'var(--text2)'}},'S'),
          h('button',{onClick:()=>navWeek(1),style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,padding:'5px 10px',color:'var(--text2)',cursor:'pointer',fontSize:14}},'›')
        )
      ),
      h('div',{className:'flex g8 mb8'},
        h('div',{style:{flex:1}},
          h('div',{style:{fontSize:10,color:'var(--text3)',letterSpacing:'.06em',marginBottom:4}},'INICIO'),
          h('input',{type:'date',className:'date-input',value:startDate,onChange:e=>ssd(e.target.value)})
        ),
        h('div',{style:{flex:1}},
          h('div',{style:{fontSize:10,color:'var(--text3)',letterSpacing:'.06em',marginBottom:4}},'FIN SEMANA'),
          h('div',{className:'date-input',style:{color:'var(--text2)'}},endDate)
        )
      ),
      h('div',{className:'flex g8'},
        h('div',{style:{flex:1}},
          h('div',{style:{fontSize:10,color:'var(--text3)',letterSpacing:'.06em',marginBottom:4}},'FASE'),
          h('select',{className:'sel-input',value:filtFase,onChange:e=>sff(e.target.value)},
            h('option',{value:'all'},'Todas las fases'),
            fases.map(f=>h('option',{key:f.id,value:f.id},f.name))
          )
        ),
        h('div',{style:{flex:1}},
          h('div',{style:{fontSize:10,color:'var(--text3)',letterSpacing:'.06em',marginBottom:4}},'RESPONSABLE'),
          h('select',{className:'sel-input',value:filtResp,onChange:e=>sfr(e.target.value)},
            h('option',{value:'all'},'Todos'),
            resps.map(r=>h('option',{key:r,value:r},r))
          )
        )
      )
    ),

    // Nota de terreno
    h('div',{className:'card mb10'},
      h('div',{style:{fontSize:10,fontWeight:700,color:'var(--text3)',letterSpacing:'.1em',marginBottom:6}},'NOTAS DE TERRENO'),
      h('textarea',{className:'nota-ta',value:manualData.nota||'',onChange:e=>saveNota(e.target.value),placeholder:'Observaciones generales de la semana...'})
    ),

    // Days
    weekDays.map(({name,date,display})=>{
      const ganttTasks=tasksForDay(date);
      const manTasks=(manualData.tasks[date]||[])
        .filter(t=>filtFase==='all'||t.fase===filtFase)
        .filter(t=>filtResp==='all'||t.resp===filtResp);
      const totalTasks=ganttTasks.length+manTasks.length;
      const doneTasks=manTasks.filter(t=>t.done).length;

      return h('div',{key:date,className:'wk-day'},
        h('div',{className:'wk-day-hdr'},
          h('div',{className:'wk-day-name'},name),
          h('div',{className:'flex aic g6'},
            h('span',{className:'wk-day-date'},display),
            totalTasks>0&&h('span',{className:`pill ${doneTasks===totalTasks?'pill-green':'pill-gray'}`},
              doneTasks+'/'+totalTasks
            )
          )
        ),

        // Gantt tasks for this day
        ganttTasks.map(t=>{
          const fi=faseInfo(t.fase);
          const pct=parseInt(t.pct)||0;
          return h('div',{key:t.id,className:'task-item',style:{borderColor:fi.color+'44'}},
            h('div',{className:'task-info'},
              h('div',{className:'task-name'},t.name),
              h('div',{className:'task-meta'},
                h('span',{className:'fase-tag',style:{background:fi.color+'22',color:fi.color,padding:'1px 6px',borderRadius:10,fontSize:10,fontWeight:600}},fi.name),
                t.resp&&h('span',{className:'resp-tag'},t.resp.length>16?t.resp.slice(0,16)+'…':t.resp),
                h('span',{className:'mono',style:{fontSize:10,color:pc(pct)}},pct+'%')
              )
            )
          );
        }),

        // Manual tasks for this day
        manTasks.map(t=>{
          const fi=faseInfo(t.fase);
          return h('div',{key:t.id,className:`task-item ${t.done?'done':''}`,style:{borderColor:fi.color+'33'}},
            h('button',{className:`task-check ${t.done?'on':''}`,onClick:()=>toggleManual(date,t.id)},
              t.done&&h('span',{style:{color:'#fff',fontSize:10,fontWeight:700}},'✓')
            ),
            h('div',{className:'task-info'},
              h('div',{className:`task-name${t.done?' '+'done':''}`},t.name),
              h('div',{className:'task-meta'},
                h('span',{className:'fase-tag',style:{background:fi.color+'22',color:fi.color,padding:'1px 6px',borderRadius:10,fontSize:10,fontWeight:600}},fi.name),
                t.resp&&h('span',{className:'resp-tag'},t.resp)
              )
            ),
            h('button',{className:'task-del',onClick:()=>delManual(date,t.id)},'×')
          );
        }),

        // Add task row
        h('div',{className:'add-row'},
          h('input',{className:'add-input',value:dayInput[date]||'',
            onChange:e=>sdi({...dayInput,[date]:e.target.value}),
            placeholder:'+ Tarea para '+name+'...',
            onKeyDown:e=>{if(e.key==='Enter'){addManual(date,dayInput[date]||'');sdi({...dayInput,[date]:''});}}
          }),
          h('button',{className:'add-btn',onClick:()=>{addManual(date,dayInput[date]||'');sdi({...dayInput,[date]:''})}},'+'
          )
        )
      );
    })
  );
}

// ── MAIN APP ───────────────────────────────────────────────
function App(){
  const[state,ss]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(SK))||{};}catch{return{};}
  });
  const save=(patch)=>{const ns={...state,...patch};ss(ns);localStorage.setItem(SK,JSON.stringify(ns));};
  const[toastMsg,showToast]=useToast();

  const{auth,tab='dash',saves={},ganttData={},weekData={}}=state;

  if(!auth)return h(Login,{onLogin:(a)=>save({auth:a})});

  const setTab=(t)=>save({tab:t});
  const onSave=(dep,sv)=>save({saves:{...saves,[dep]:sv}});
  const onGanttSave=(gd)=>save({ganttData:gd});
  const onWeekSave=(wk,wd)=>save({weekData:{...weekData,[wk]:wd}});

  const navTabs=[
    {id:'dash',icon:'◆',label:'Dashboard'},
    {id:'partidas',icon:'🔍',label:'Partidas'},
    {id:'pisos',icon:'⬢',label:'Pisos'},
    {id:'gantt',icon:'▤',label:'Gantt'},
    {id:'programa',icon:'📅',label:'Plan Maestro'},
  ];

  let content;
  if(tab==='dash')content=h(Dashboard,{saves,ganttTasks:ganttData.tasks||[]});
  else if(tab==='partidas')content=h(PartidasView,{});
  else if(tab==='pisos')content=h(PisosView,{saves,onSave,toast:showToast});
  else if(tab==='gantt')content=h(GanttView,{ganttData,onGanttSave,auth,saves,toast:showToast});
  else if(tab==='programa')content=h(ProgramaView,{ganttData,saves,onWeekSave,weekData,auth,toast:showToast});
  else content=h(Dashboard,{saves});

  return h('div',{className:'app'},
    h('div',{className:'nav'},
      h('div',{style:{fontSize:17,fontWeight:700,letterSpacing:'.12em',color:'var(--blue)'}},
        '✦ OBRA'
      ),
      h('div',{className:'flex aic g8'},
        h('span',{style:{fontSize:11,color:'var(--text3)'}},auth.role),
        h('button',{onClick:()=>save({auth:null}),
          style:{background:'none',border:'1px solid var(--border)',borderRadius:6,padding:'4px 10px',color:'var(--text2)',fontSize:11,cursor:'pointer',letterSpacing:'.04em',transition:'all .15s'},
          onMouseOver:e=>{e.target.style.borderColor='var(--red)';e.target.style.color='var(--red)';},
          onMouseOut:e=>{e.target.style.borderColor='var(--border)';e.target.style.color='var(--text2)';}
        },'Salir')
      )
    ),
    h('div',{className:'main'},content),
    toastMsg&&h('div',{className:'toast',style:{background:toastMsg.color||'var(--green2)'}},toastMsg.m),
    h('div',{className:'bnav'},
      navTabs.map(t=>
        h('button',{key:t.id,
          className:`bnav-btn${tab===t.id?' on':''}`,
          onClick:()=>setTab(t.id)
        },
          h('span',{className:'bnav-icon'},t.icon),
          t.label
        )
      )
    )
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App,null));
</script>
